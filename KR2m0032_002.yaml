front:
  text: 欽定四庫全書史部十三
  hash: sha256:37715509aef7f3494164bc585a87d8624d4b4517ea757749fe3b4d88b8516ad7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0032_WYG_002-1a, image: WYG0651/WYG0651-0604a.png}
body:
  text: 明宫史政書類二儀制之屬提要臣等謹案明宫史五卷舊本題蘆城赤隠吕毖校次毖始末未詳考明末有吕毖字貞九呉縣人嘗撰事原初畧三十四卷序題崇禎甲申姓名時代皆相合疑即其人然艸茅之士何由得詳記禁庭事殆不可解毋乃奄人知文義者所私記毖依附其門為之編録故不稱撰述而稱校次歟其書叙述當時宫殿樓臺服食宴樂及宫闈諸雜事大抵冗碎猥鄙不足據為典要至於内監職掌條内稱司禮監掌印秉筆秩尊視元輔權重視總憲云云尤為悖妄葢歴代奄寺之權惟明為最重歴代奄寺之禍亦惟明為最深二百餘年之中盗持魁柄濁亂朝綱卒至於宗社郊墟生靈塗炭實為漢唐宋元所未有迨其末造乆假不歸視威福自専如具固有遂肆無忌憚筆之於書故迹其致亡之道雖亦多端要以寵任貂璫為病本之所在也我朝自列聖以來家法森嚴内豎不過供灑掃或違律令必正刑章不待於逺引周官委權冡宰而乾綱獨握宫掖肅清已足垂法於萬世乃猶防微杜漸慮逺思深特命繕錄斯編登諸冊府著前代亂亡之所自以昭示無窮伏考尚書有曰殷鑒不逺在夏后之世詩大雅有曰儀鑒于殷亦越漢之髙帝使陸賈作新語亦曰著秦之所以失與我之所以得葢時代彌近資考鏡者彌切也皇上於内殿叢編撿逢是帙闢其繆而仍存之聖人之所見者大矣謹恭録諭㫖弁冕簡端仰見衡鑒親操折衷衆論勒千古未有之鴻編皆義主勸懲言資法戒非徒以雕華浮艶為蔵弆之富也乾隆四十七年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f2d260f6a3a04bb74fd3ac595f5e70a43db9f83af5e00dae14cc16a4eaef3ba7
