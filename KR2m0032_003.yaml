body:
  text: 明宫史卷一明吕毖撰宫殿規制皇城外層向南者曰大明門與正陽門永定門相對者也稍北過公生左門而向東者曰長安左門再東過玉河橋自十王府西夾道往北向東者曰東安門轉而過天師菴草場轉西向北曰北安門即俗稱厚載門是也轉而過太平倉迤南向西曰西安門再南過靈濟宫灰厰向西曰長安右門紅栅之内門之北則登聞鼓院在焉此外圍之六門牆外周圍紅舖七十二處紫禁城外向南第一重曰承天之門每年霜䧏後吏部等衙門朝審刑部重囚在門前中甬道之西東西甬道之南五府等衙門坐東向西吏部等衙門坐西朝東吏部主筆者第一座刑部正堂第二座都察院第三座餘以次列之南二重曰端門三重曰午門魏闕西分曰左掖門曰右掖門轉而向東曰東華門向西曰西華門向北曰𤣥武門此内圍之八門也牆外周圍紅舖三十六處每晚有勲臣一員在門左門内直宿每更官軍提銅鈴巡之而䕶城之河遶焉皇城内自北安門裏街東曰黄瓦東門門之東街南曰尚衣監街北曰司設監再東曰酒醋麫局曰内織染局曰皮房紙房曰針工局巾帽局曰火藥局即兵仗局之軍器庫也再東稍南曰内府供用庫曰畨經厰曰道經厰曰司苑局曰鐘鼓司再南曰新房曰都知監曰司禮監司禮監第一層門向西與新房之門一様門之内稍南有松樹十餘株者内書堂也先師位供安向南其楹聯曰學未到孔聖門牆須努力儧行㡬步了不盡家庭事業且開懐丢在一邊聖人位之北一間則内書堂教書詞林先生講憩之所也㕑房設在後凡米肉食料俱取辦于光禄寺内書堂稍北曰崇聖堂再北向南者則二層門矣入此門再東朝南者斯本監公㕔之大門也門外有東西二井遞封汲之西井之西一小門東井之東一小門其内皆提督監官典簿文書房掌司所居房屋也古書籍名畫筆墨綾紗紙劄各有庫貯焉新房之北司禮監也新房之南御馬監也所謂新房者東西一街南北一連二連三連等連連之十字路口各有井御馬監之南向西者曰杆子房曰北膳房曰暖閣厰之東門可通河而西門最高大啟閉不便遂于大門扇上復開一小門以便行走河之西岸榆栁成行花畦分列如田家也曰南膳房再南曰冥器厰曰混堂司曰内東厰曰尚膳監撥子斜對御馬監向東者曰北花房亦辦膳之所也曰印綬監曰中書房曰蹴圓亭武廟恒臨幸之曰内承運庫此庫掌印僉書掌司寫字諸人所住之署也此路總名之曰東河邊尚有房八區則司禮監秉筆隨堂衆住所謂河邊直房是也過東上北門東中門街北曰彈子房曰學醫讀書處曰光禄寺街南曰篦頭房再東則東安門裏俗所稱牆門者過橋則東安門也自東至南門之東曰重華宫其前曰重華門曰廣愛門曰咸熙門曰肅雍門曰和熙門猶乾清宫之制而後有兩井東西有兩長街西長街則有興善門麗京門長春門清華門寧福宫嘉福宫明徳宫永春宫永寧宫延禧宫延春宫宜春宫今為停喪之所凡妃嬪皇子皇女之喪皆于此停靈至發引時出東上南門東上北門北中門北安門詣西山等處墳園安厝東長街則有廣順門中和門景華門宣明門景明門洪慶門洪慶殿供畨佛之所也又有膳房又有門曰景和門又東則内承運庫藏也自東上南門迤南街東曰永泰門門之内街北則重華宫之前門也其東有一小臺臺上有一小亭再東南則崇質殿俗云黑瓦殿是也景泰間英廟自北狩回所居永泰門再南街東則皇史宬珍藏太祖以來御筆實録要𦂳典籍石室金櫃之書此其處也皇史宬每年六月初六日奏知曬晾司禮監第一員監官提督董其事而稽覈之其看守則監工也左右小門曰􅀈音龍厯左門曰􅀈厯右門再東則追先閣欽天閣透珨碑在焉世廟御製欽天頌勒于碑碑石光潤近似卧碑制也再南則御前作也皇史宬之西過觀心殿射箭處稍南有門曰蒼龍其南則昭明門其西南則嘉樂館也其北曰丹鳯門門列金獅二内有正殿曰龍徳左殿曰崇仁右殿曰廣智正殿殿後則飛虹橋也橋以白石為之鑿獅龍鼃鼈魚蝦海獸水波洶湧活躍如生云是三寶太監鄭和自西域得之非中國石工所能製者橋之前右邊一塊缺損云是中國補造屢易屢泐亦古跡也橋之南北有坊二曰飛虹曰戴鼇姜立綱筆也橋之東西有天光雲影二亭又北疊石為山山下有洞額曰秀巖以磴道分而上之其高高在上者乾運殿也左右各聳一亭曰凌虚曰御風隔以山石藤蘿花卉若牆壁焉又後為永明殿最後為圓殿引流水遶之曰環碧又再東曰玉芝宫後殿曰大徳殿外劵門曰寶慶門曰延祥門曰佳麗門其東牆外則觀心殿也自皇史宬東南有門通河河上曰湧福閣舊名澄輝閣俗所謂騎馬樓者是也迤東沿河轉北則吕梁洪則東安橋再北有亭居橋上曰涵碧又北則囘龍觀在焉其殿曰崇徳者是也觀多海棠每至春深盛開之時聖駕多臨幸之是河也從北安門外文昌宫迤東步糧橋入經皮房内織染局巾帽局御馬監之東東安門橋下至長安左門外迤東之玉河橋出焉北安門内街東曰安樂堂凡内官有疾者送此調理山陵及外厰九門官則不送也再南黄瓦西門之裏則内官監也過北中門迤西則白石橋萬洪殿等殿至大高𤣥殿則習學道經内官之所居也其北則裏氷窨也北中門之南曰壽星殿左曰毓秀館右曰育芳亭後曰萬福閣其上曰臻福堂曰永禧閣其下曰聚仙室曰延寧閣曰北果園殿之西門内有樹一株掛鐵鑄雲板因年乆樹長遂銜雲版于樹榦之内止露十之三誠古跡也殿之東曰永壽殿曰觀花殿植牡丹芍藥甚多曰集芳亭曰㑹景亭曰翫春樓其下曰壽安室曰觀徳殿亦射箭處也與御馬監西門相對乃壽皇殿之東房萬厯中年始開者殿之南則萬嵗山俗所謂煤山者此也故老云土查堆築而成崇禎己巳冬大京兆疏亦曾誤指為有煤山下樹木葱鬱鶴鹿成羣呦呦之鳴與在陰之和互相喚發可並聞于霄漢間上有一成磴道每重陽日聖駕在山頂陞座可遙望靡涯矣山之門曰萬嵗門再南曰北上門左曰北上東門右曰北上西門西可望乾明門東可望御馬監也再南過北上門則紫禁城之𤣥武門也此上西門之西大高𤣥殿也其前門曰始青道境左右有牌坊二座曰先天明鏡曰太極仙林曰孔綏皇祚曰𢎞祐天民又有閣二座左曰炅呼如陽明閣右曰相呼如陰靈軒内曰福靜門曰康生門曰高𤣥門曰蒼精門曰黄華門殿之東北曰無上閣其下曰龍章鳯篆曰始陽齋曰象一宫所供象一帝君範金為之高尺許乃世廟𤣥修之御容也稍西曰石作曰圓明閣又西曰乾明門門裏迤南曰兵仗局曰西值房即尚衣監所屬之袍房也曰舊監庫屬内官監地方曰尚膳外監曰甜食房曰西上北門其東向北者則西下馬門矣紫禁城䕶城河一帶其東有内承運庫衙門起至北花房止西岸有矮河牆羅列石作物料其東北角西北角有澡馬河礓䃰石栅自西北上門過西上南門向東則御用監也又南向西則銀作局也再南過橋向南者曰靈臺亦有觀象臺銅鑄渾天儀以測星度觀雲氣焉沿河西岸而南者曰寶鈔司自西中門之西則尚寶監也鷹房司也屬尚監再西出西苑門迤南向東曰灰池曰水碓水磨河之西土坡之上曰昭和殿曰擁翠宫曰趯臺坡曰澄淵亭又北曰紫光閣再西曰萬壽宫曰壽源宫嘉靖四十四年春更曰百禄宫曰五福殿曰承祐殿左祐祥殿右祐寧殿曰龍吉齋曰鳯祥館曰昭祥閣曰朗瑞居曰耀曦門曰耀朗門曰含祥門曰成瑞門曰永和門曰永順門曰永綏門曰永祉門曰納康門曰長寧門曰凝一殿其東曰萬春宫曰含春殿曰萬和宫曰萬華宫曰萬寧宫曰御饌庖曰體仁門曰履康門曰啟泰門曰納福門曰泰安門其西曰仙禧宫曰仙樂宫曰仙安宫曰仙明宫其朝東南起有門廿一曰常寧曰常和曰常善曰常耀曰金寧曰攸順曰攸利曰金靜曰金瑞曰宣惠曰靜安曰素康即灌木曰金寧即授衣曰常靜曰壽安曰康成曰東和其南曰陽徳曰永光曰嘉安其東曰柏木殿曰旋坡臺即兔兒山顯揚殿也曰迎仙亭牌坊二南曰福巒北曰禄渚臺上七層牌額曰玉光曰光華曰華耀曰耀真曰真境曰境仙曰仙臺曰朝元館曰景徳殿曰大光明殿曰登豐門曰廣福門曰太始殿曰太初殿曰宣恩亭曰饗社亭曰一陽亭曰萬仙亭後曰永吉門曰左安門曰右安門曰太極殿曰統宗殿曰縂道殿曰天元閣下曰闡𤣥保祚朝東外二門曰天平曰豐和曰無逸殿曰豳風亭曰落成殿金海石橋之北河之西岸向南曰玉熈宫曰承華殿即迎翠殿曰寶月亭曰芙蓉亭曰清馥殿曰丹馨殿曰錦芳亭曰翠芬亭曰長春門曰昭馨門曰端芬門曰馥景門曰仙芳門曰馥東門曰馥西門曰澄碧亭曰騰波亭曰飛靄亭曰騰禧殿即黑老婆殿也曰王媽媽井河之上游倒影入水如城闕龍宫者曰乾徳殿即俗所云北臺是也高八丈一尺廣十七丈磴道三分三合而上之萬厯二十九年夏建乾清宫牌子朝中内官監總理陳永壽董其役至天啟元年十一月十四日奉㫖折毁平之天啟四年夏就其處為嘉豫殿其門曰迎涼門牌坊南曰福渚北曰壽岳河中有亭五中曰龍澤左曰澄祥右曰湧瑞左曰滋香右曰浮翠總謂之曰五龍亭也又洞三上曰龍壽中曰玉華下曰遊仙已上俱萬厯三十年秋添其三洞至天啟元年冬拆再西則内教場也曰振武殿曰恒裕倉曰省斂事稍南臨河有坊曰引祥橋其東則北閘口曰洪應殿曰壇城曰轟雷軒曰嘯風室曰嘘雪室曰雲雨室曰耀電室曰清一齋曰寶淵門曰靈安堂曰精馨堂曰馭仙次曰輔國堂曰演妙堂曰入聖居也自北閘口迤南東岸曰船屋乃冬日藏龍舟之所有𢎞濟神祠橋之南亦有船屋焉再南曰𤣥熙殿有馬頭左擁翠亭右飛香亭後更名曰𤣥潤亭再南曰陟山門通裏氷窨者也又西馬頭曰龍淵亭曰念善館又有𤣥雷居又有亭曰龍湫又有殿曰壽源即太素殿曰正心齋曰博敬齋曰素左門曰素右門曰隆治門曰騰瑞亭曰滋祥亭又再南巋然若山者廣寒殿即俗云蕭后梳粧臺也萬厯七年傾頽其中錢多至元年號神宗亦曾分賜輔臣張居正數枚曰太液橋其牌坊曰堆雲曰積翠今止存山石基址天啟年間魏忠賢擅政又將舊砌山石俱拆毁焉又再南曰圓殿即承光殿也磚砌如城牆亦有雉堞以磴道分上之上有樓閣古松松乃數百年物霜榦虬枝式如偃蓋凡枝之垂者皆以杉木撑拄之此乾明門之西也其石梁如虹直跨金海通東西之往來者曰玉河橋有坊二曰金鼇玉蝀萬厯年間每遇七月十五日道經厰漢經厰做中元法事放河燈于此橋之中一空約丈餘以木杇代石亦用木欄杆橋之東岸再南曰五雷殿即椒園也亦名蕉園凡修實録成於此焚草左迎祥館右集瑞館曰太𤣥亭曰問法所曰臨漪亭曰水雲榭再南則至西苑門矣由玉河橋玉熙宫迤西曰櫺星門迤北曰羊房夾道牲口房虎城在焉内安樂堂在焉櫺星門迤西曰西酒房曰西花房曰大藏經厰即司禮監之經厰也又西曰洗帛厰曰果園厰曰西安裏門曰甲字等十庫曰司鑰庫曰鴿子房街南曰惜薪司正西則西安門也櫺星迤西街南贓罰别庫之門也門之東迤南曰蠶池曰陽徳門又西曰迎和門則萬壽宫之門也自陽徳門外皆可以至河是河也由北安門外藥王廟西橋下入縈迴洸漾蓄洩惟謹蓮藕魚鰕味最美其萑葦茂密水禽上下儼若江南景云冬至河凍可拖牀以木作平板上加交牀或稿薦一人在前引繩可拉三二人行氷如飛遇積雪殘雲景更如畫世廟晚年尚𤣥修多居西内嘉靖壬寅正月十六日皇太子自宫中往見即絶河氷而過時閤臣夏言詞云胡床穩坐渡層氷即指拖床作也萬厯年間臨御既乆禁網疎濶每于河凍之後近京貧民羣來趂食即于皇城内外凡有冰處拉拖床以餬口遇雪後林臯間拖床者艷素相間交拉如織亦有興豪乘醉而頻往返者至春冰將泮或間有沉溺捐生其河自寶鈔司東與䕶城河之西脈合流過長安右門之北經承天門前再東過長安左門之北自湧福閣㑹歸于皇城之巽域而總出焉䕶城河者自北閘口分流經内官監白橋大高𤣥殿之東北上西門之外半邊石半邉磚橋入此橋半用石者防車輪耳大高𤣥殿前竪石牌二曰宫眷人等至此俱下車馬世宗尊崇𤣥教敬恪如此水由橋下至紫禁城牆下䕶城河而東而西經太廟之東玉芝宫飛虹橋之西而西脈則自太社太稷壇之西至靈臺寶鈔司之東總合流于湧福閣之河焉紫禁城内之河則自𤣥武門之西從地溝入至廊下家由懐公門以南過長庚橋與馬房橋由仁智殿西御酒房東武英殿前思善門外歸極門北皇極門前㑹極門北文華殿西而北而東自慈慶宫前之徽音門外蜿蜒而南過東華門裏古今通集庫南從紫禁城牆下地溝亦自巽方出歸䕶城河或顯或隠總一脈也神廟乆不臨御河遂壅塞不通幫石圮泐者多魏忠賢專政時勒令疏通是河也非謂魚泳在藻以恣遊賞又非故為轉折以耗物料蓋恐有意外回禄之變則此水儘可賴焉天啟四年六科廊灾六年武英殿西油漆作灾皆得此水之濟而鼎建皇極等殿大工凡灰泥等項皆用此水回想祖宗設立良有深意且宫後苑魚池之水慈寧宫魚池之水各立有水車房用驢拽水車由地灌以運輸咸賴此河云大明門内曰承天門其門裏之東一門内則太廟也西一門内則太社太稷也曰端門内則六科也東曰闕左門再東則松林㑹堆處也西曰闕右門其居中巍然而向明者午門也鐘鼓在焉旗纛在焉曰左掖門曰右掖門門之内居中向南者皇極門即承天門也俗所謂羅兒天銅壺滴漏在此其左曰𢎞政門即東角門也考選通政司叅議及鴻臚寺官在此焉右曰宣治門即西角門也居西向東曰歸極門即右順門也居東向西曰㑹極門即左順門也皇極門内居中向南者皇極殿即奉天殿也金磚玉瓦在殿額兩傍左向西者曰文昭閣即文樓也右向東者曰武成閣即武樓也南北連屬穿堂上有滲金圓頂者曰中極即華葢殿也殿之兩傍東曰中左門西曰中右門再北曰建極殿即謹身殿也俱嘉靖四十一年重修工完所更改今名者也殿居中向後高踞三躔白玉石欄杆之上與乾清門相對者雲臺門也兩傍向後者東曰後左門西曰後右門即雲臺左右門亦名曰平臺也凡召對閣臣等官或于平臺即後左門也又東則景運門也西則隆宗門也隆宗門西向南者仁徳門也乾清門外左右金獅各一入門丹陛直至乾清宫大殿其殿内居中向南大匾曰敬天法祖四字則崇禎元年八月初四日懸掛係司禮監掌印高太監時明筆也殿左曰日精門右曰月華門左小門曰龍光右小門曰鳯彩殿之東西有斜廊廊之後左曰昭仁殿右曰𢎞徳殿東西各有角門宫後披簷東曰思政軒西曰養徳齋再北則穿堂居中圓殿曰交泰殿其滲金圓頂亦猶中極殿之制也再北曰坤寧宫則皇后所居也曰永祥門增瑞門俱萬厯二十五年二月十一日添額宫之東披簷曰清暇居北園廊曰游藝齋俱崇禎五年十月二十三日懸安者也宫後左曰景和門右曰龍福門再北右曰端則門左曰基化門便接瓊苑東西門矣坤寧宫有門原曰廣運門至嘉靖十四年七月初二日改曰坤寧門萬厯三十三年乾清宫坤寧宫俱鼎建告成至四十年後始御居乾清宫西煖閣乾清宫大殿之左向西者曰端凝殿尚冠等近侍所司御服衮冕玉圭冠帶等錢糧貯此左向東者曰懋勤殿天啟皇剏造地炕于此恒臨幸之此㣲垣北辰深邃之處中一路之大畧也過日精門之東曰崇仁門稍南曰内東裕庫曰𢎞孝殿曰神霄殿即舊名崇先殿也日精門在北向南曰景明門今曰順徳左門則東一長街也再北向西與龍光門斜相對者曰咸和左門向南者曰景仁宫其東則東二長街也南首曰麟趾門北首曰千嬰門麟趾門之東曰延祺宫曰怡神殿再東曰嘉徳左門又東則蒼震門也此門恒閉遇埽雪修造則開咸和左門之北向西與景和門相對者曰廣和左門向南者曰承乾宫東宫娘娘所居也東二長街之東曰永和宫廣和左門之北向西與基北門相對者曰大成左門向南者曰鍾粹宫今曰興龍宫東二長街之東曰景陽宫孝靖皇后曾居此千嬰門之北並列者則乾東之房五所其東後小門每月初四十四二十四日打掃凡有事則開也宫正司六尚局皆在乾清宫之東已上皆東一路之大畧也過月華門之西曰膳㕑門即遵義門向南者曰養心殿前東配殿曰履仁齋前西配殿曰一徳軒後殿曰涵春堂東曰隆禧館西曰臻祥館殿門南則司禮監太監秉筆之直房也其後層尚有大房一連緊靠隆道閣後祖制宫中膳房也魏忠賢移膳房于怡神殿將此房亦改為秉筆直房養心殿之西南曰祥寧宫宫前向北者曰無梁殿係世廟烹煉丹藥之處其制一木不有皆磚石砌成者月華門之西南巋然者隆道閣原名皇極閣後更道心閣至隆慶四年春更此名也左曰仁蕩門右曰義平門此二門原名㑹極歸極世廟時改之閣之下曰仁徳堂即舊名精一堂隆慶四年春更者前曰仁徳門萬厯二十四年兩宫灾後開此門出入至神廟晩年移居乾清宫始閉不恒開也閣之東曰忠義室閣之西南過義平門則慈寧宫矣萬厯年間慈聖李老娘娘所居泰昌元年八月神廟皇貴妃鄭老娘娘亦居此神廟東宫昭妃鄭老娘娘亦居此天啟七年八月後熹廟皇貴妃范娘娘又居此宫月華門往北曰順徳右門則西一長街也再北向東與鳯彩門斜相對者曰咸和右門即廣安門向南者曰毓徳宫即長樂宫萬厯四十四年冬更曰永壽宫其西則西二長街也南首曰螽斯門北首曰北百子門螽斯門西曰啟祥宫神廟自兩宫灾先移居于毓徳宫後遂移居于此宫萬厯三十年春聖體不豫曾召輔臣沈一貫至此宫此宫乃獻皇帝發祥之所原名未央宫世廟入繼大統至四十年夏特更名曰啟祥宫門内石坊向北扁石青地金字四原曰貞源茂始後更之曰聖本肇初向南字四原曰慶澤無終後更之曰𤣥徳永衍再西則嘉徳右門即舊名景福門也其兩旛杆插雲向南而建者隆徳殿也舊名𤣥極寶殿隆慶元年夏更曰隆徳殿供安𤣥教三清上帝諸尊神萬厯四十四年十一月初二日被燬天啟七年三月初二日重修崇禎五年九月内將諸像移送朝天等宫安藏六年四月十五日更名曰中正殿東配殿曰春仁西配殿曰秋義東順山曰有容軒西順山曰無逸齋再西北曰英華殿舊名隆禧殿供安西畨佛菩薩像殿前有菩提樹二株婆娑可愛結子可作念珠又有古松翠柏幽靜猶山林焉三十年秋各殿復供安聖像如前自嘉徳右門之西向南者曰二南門門之北則八角井也水不堪汲天啟六年亦曾修改而味竟不堪其廢井也再北曰四徳門再西曰咸安宫穆廟繼選皇后陳老娘娘曾居于此天啟年間客氏曾移居之咸和右門之北向東與隆福門相對者曰廣和右門向南者曰翊坤宫油宫娘娘所居西二長街之西曰永寧宫天啟改曰長春宫成妃李娘娘曾居此廣和右門向東與端則門相對者曰大成右門向南者曰儲秀宫西二長街之西曰咸福宫百子門之東並列者則乾西之房五所其西後小門凡有事則開如東後小門總乾清門官經管故閉也已上皆西一路之大畧也東西二小門之外皆有惜薪司貯柴炭之園備宫中進用焉坤寧宫之後則宫後苑也欽安殿在焉供安𤣥天上帝之所也有門曰天一之門殿之東北有足跡二傳云世廟時兩宫回禄之變𤣥帝曾立此黙為救火其靈跡顯佑有如此者崇禎五年秋隆徳英華殿諸像俱送付朝天等宫大隆善等寺安藏惟此殿聖像獨存未動也曰承光門曰集福門曰延和門苑内曰萬春亭曰千秋亭曰對育軒曰清望閣曰金香亭曰玉翠亭曰樂志齋曰曲流館曰四神祠曰硯花殿萬厯十一年春拆去纍垜石山子劵門石扁名曰堆秀山山上蓋亭一座名曰御景亭東西兩邊魚池二處其東曰浮碧亭西曰澄瑞亭凡竒花異樹禽聲上下春花秋月景色可人東南曰瓊苑東門西南曰瓊苑西門即東一長街西一長街之北首也其南首則東西夾牆也欽安殿後坤寧門嘉靖十四年秋更名曰順貞門其宫牆外則紫禁城之𤣥武門每夜之更鼓在焉𤣥武門裏迤東有廊下家可十一門而更鼓房則儘東首為紫禁城之艮隅也乾清宫門圍牆之内左右廊房之朝南半間者曰東夾牆曰西夾牆特制糞桶堅好仍于幇溝處以木板為牆離地二三尺開圓孔安竹筒長六七尺者十餘根為内臣便溺免沾汚衣靴也慈寧宫西第等處皆宫眷内官便溺之所宫牆之外磚砌劵門安大石于上鑿懸孔垂之各有淨車在下接盛于每月初四十四二十四日開𤣥武門及各小門掃之自嘉徳右門之西曰太安門其外向西曰長庚門凡放夫匠淘溝及修造或年老有勞宫人病故皆奏開此門以便出入其外自𤣥武門迤西可乆開自北而南過長庚橋至御酒房後牆曰長連可三十一門再前層曰短連可三門並𤣥武門東計之通共五十四門總曰廊下家俱答應長隨所住各有佛堂以供香火三時鐘磬宛如梵宫凡遇有風之日即輪挨一人大聲巡警曰謹慎燈燭牢插線香禁地嚴慎火燭有如此各門所栽棗樹森鬱其實甜脆異常衆長隨各以造麫做酒貨賣為生都人所謂廊下内酒是也長庚橋南有柿樹一株高二丈餘每至霜後柿懸樹杪丹色可愛凡文書房並司禮監監官典簿各占過宿直房自隆宗門外朝東者曰司禮監經厰直房日用紙劄筆墨書籍皆貯于此候御前取討過慈寧宫外層向東小門之南曰北司房即文書房也再南曰司禮監管賞處即兩班四撥寫字所居也亦有第房木桶竹筩為衆便溺之所再南曰外膳房再南曰南司房即監官典簿直房也隆宗門外朝西者亦監官典簿直房也有井存焉再南則寶寧門門外偏西大殿曰仁智殿即俗所謂白虎殿者是也凡大行帝后梓宫靈位在此停供其西南曰御酒房西北曰馬房監官典簿奉㫖問刑拷打内犯之所門外有二大樁俗云裏馬房者此也東南曰思善門門外橋西曰武英殿命婦朝皇后于此再西曰太庖㕑曰尚膳監乃第一員總理及管理僉書掌司所居也武英殿之西南曰御用裏監乃把總等官所居再東曰南薫殿凡遇徽號册封大典閣臣率領中書官篆冩金寶金册在此例有司禮監太監奉欽遣臨視管待御用監裏監把總管置辦盛席伺候必殺鹿一隻蒸炰作羹以明豐侈此舊典也再東曰歸極門所謂逍遙城者在六科廊背後此門之西南礓䃰之下漢王高煦寘銅缸中曾炙死于此至天啟年間鼎建大工時官匠亦計議及此魏忠賢曰這是國家甚麽吉祥好勾當存之何為遂冺其迹今亡之矣從歸極門裏向西南入曰六科廊東西兩房掌司所居精㣲科及章疏在焉過皇極門再東曰㑹極門凡京官上本接本俱于此處各項本奉㫖發抄亦必由此處㑹極門裏向東南入曰内閣輔臣票本清禁處也出㑹極門之東礓䃰下曰佑國殿供安𤣥帝聖像籖最靈其像金鑄成者曾經盜去鎔化惟像首屢消不化盜惟藏之兠肚内晝夜隨身後事遂由此發露將盜置法至于寶善門思善門乾清門仁徳門平臺之西室及皇城各門皆供闗聖之像佑國殿之東則内承運庫銀兩表裏等錢糧貯藏之所也兩庫之間有槐一株自徽音門南望枝榦扶疎茂翠可愛有井甘洌可用再東過一小石橋曰香庫乃内府供用庫答應錢糧之所又稍北有庫一連坐東向西有石碑曰古今通集庫係印綬監職掌古今君臣畫像符劵典籍貯此每年六月初六日曬晾如皇史宬例再北曰東華門門内有石橋橋之北有樹三株曰馬纓樹高不足丈其葉似槐而細長晝舒夜斂其花粉紅色無瓣而皆若蕋結角如椿亦可種而生是以名之曰馬纓也再北曰馬神廟御馬監該班官及良馬十餘匹在此有飛龍二大字太監蕭敬筆也㑹極門東向南者曰文華殿也後殿扁曰二帝三王平治天下大經大法者乃慈聖老娘娘御書後人多以為神廟御書分六行每行二字前殿扁曰繩愆糾繆者亦慈聖老娘娘特命小臣杜詩冩也殿内圍屏中數扇畫輿地圖左數扇貼文官職名右數扇貼武官職名遇陞遷則更易之此係萬厯初年輔臣張文忠公居正所創進者至二十四年之後神廟御居啟祥宫另換一小圍屏高二丈中左右亦貼文武職名于啟祥宫前殿安設文華殿前後柱上對聯曰念終始典于學期邁殷宗於緝熙殫厥心若稽周后又曰披皇圖考帝文九㝢化成于几席游禮闕翔藝圃六經道顯于羮牆又曰四海昇平翠幄雍容探六籍萬幾清暇瑤編披覽惜三餘又曰縱横圖史發天經地緯之藏俯仰古今期日就月將之益又曰西崑峙九玉之峯寶氣高騰册府東壁耿雙星之曜祥輝遙接書林殿之側有九五齋臨寶室精一堂恭黙室殿之後曰玉食館端敬殿理辦房過小門西北曰省愆居其制度用木為通透之基高三尺餘下不令牆壁至地其四圍亦不與别處接連凡遇天變灾眚聖駕居此以示修省之意殿之東曰神㕑内有一井凡每祭司井之神即于此井具儀祭之殿之西曰崇本門殿之後曰刻漏房銅壺滴漏在此凡八刻水交一時直殿監官抱時辰牌赴乾清門裏換之牌長尺餘濶數寸石青地金字某時凡道途遇之者必側立讓行坐者必起立亦敬天時之義也殿之東北向後開門者曰聖躋殿供三皇厯代明醫御服藥餌之處也徽音門裏亦曰麟趾門其内則慈慶宫也神廟時仁聖陳老娘娘居此内有宫四曰奉宸宫曰朂勤宫曰承華宫曰昭儉宫其園之門曰韶圃門曰麗園門曰擷芳殿曰薦香亭麟趾門之東曰闗睢左門其内則掌印秉筆直房所謂梨園者此也西闗睢右門再西轉角向西者曰元輝殿再北曰御馬監直房每日伺候御乘良馬十餘匹在此神廟時有進到大黒牛二隻無角亦餵養于此再北曰御用等監庫再北朝南者曰寶善門門之西舊有核桃棗樹數株乃二百餘年所培植者魏忠賢因天啟二年夏風變除去以便跪馬門内迤東曰慈慶宫後門門之外神廟末年鑿一井味極甘洌北曰奉先殿即内太廟也街東曰隆祀門其内則外東裕庫也街西再北曰蒼震門又街東再北並列二門向西者曰履順曰蹈和則號殿仁壽宫之外層小門也内有􅎪鸞宫喈鳯宫凡先朝有名封之妃嬪無名封之宫眷所居養老處也各有應得養贍膳銀喫穿至病終之後該號殿看門官稟知司禮監監官典簿題知奉㫖著照某封某氏例發送此巷自寶善門亦可通𤣥武門俗稱狗灣其居中之門曰蓮花門也景運門南朝西者都知監之直房也隆宗門北朝東者司禮監人數之直房也每夜五更攢㸃至曉報九刻水者刻漏房官及答應長隨也隆宗門南朝東者曰協恭堂慈寧宫慈慶宫皆有花園有井皆有庫藏而乾清宫兩傍之宫各有井無花園惟鍾粹宫有松數株耳附記京北沙河鞏華城有門四南曰扶京東曰鎮遼西曰威漠北曰展恩内有駐鑾宫曰龍蹕門曰龍蹕殿曰廣載宫東曰凝禧之殿曰華鸞宫曰集祥宫西曰景惠之殿曰翠鳯宫曰㑹祖宫東曰麗春門曰布和門西曰延秋門曰宣澤門北曰寧逺門天壽山紅門裏曰時陟門曰時陟殿曰松露殿曰肅敬殿曰修儀館曰飾容館曰聖蹟亭曰感思門曰感思殿曰九龍池曰粹澤亭曰老君堂曰長生蹟曰長生亭湖廣承天府即世廟發祥之所舊名安陸州今改曰承天府即興都也曰重明門曰麗正門曰龍飛門曰龍飛殿曰啟運殿曰卿雲門曰卿雲宫曰鳯祥宫曰𢎞載宫曰春暉門曰秋朗門曰純一門曰純一殿曰世子府曰泰禋門曰承配殿曰保和門曰太和門曰啟祚門曰受命御極之殿曰青霄殿曰福寧殿門曰慶源殿曰光熙門曰元佑宫門曰儲祉門曰元佑門曰元佑寶殿曰宣真殿曰衍法殿曰隆祥殿曰三洞殿明宫史卷一
