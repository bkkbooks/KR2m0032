body:
  text: 明宫史卷二明吕毖撰內府職掌祖訓所載設立內府衙門職掌品級間有所未及載并載而未詳者謹譜次梗概于左按內府十二監曰司禮曰御用曰內官曰御馬曰司設曰尚寶曰神宫曰尚膳曰尚衣曰印綬曰直殿曰都知又四司曰惜薪曰寶鈔曰鐘鼓曰混堂又八局曰兵仗曰巾帽曰針工曰內織染曰酒醋麵曰司苑曰浣衣曰銀作已上總謂之二十四衙門也此外有內府供用庫內承運府庫等處亦臚列于後以備考焉司禮監掌印太監一員秉筆隨堂太監八九員或四五員設有象牙小牌一面長寸餘每日申時交接輪流該止凡每日奏文書自御筆親批數本外皆衆太監分批遵照閣中票來字樣用硃筆楷書批之間有偏傍偶誤者亦不妨略為改正最有寵者一人以秉筆掌東厰掌印秩尊視元輔掌東厰權重視總憲兼次輔其次秉筆隨堂如衆輔焉皆穿貼裏先斗牛次升坐蟒先內府騎馬次凳杌祿米每升一級則嵗加十二石各家私臣曰掌家職掌一家之事曰管家辦理食物出納銀兩曰上房執掌箱匱鎖鑰曰掌班曰領班鈐束兩班答應官人曰司房打發批文書謄寫印奏文書其下則管帽管衣靴茶㕑房打聽官看莊宅皆瑣屑事務也其餘大小衙門遇有應題奏事情皆先關白司禮掌印秉筆隨堂而始行凡御前親近大內臣如乾清宫管事打卯牌子其秩亦顯榮猶外庭之勳爵戚臣然皆得掌各衙門之印視其寵眷厚薄而欽傳畀之不拘資次司禮監提督一員秩在監官之上于本衙門居住職掌古今書籍册葉手卷筆硯墨綾紗絹布紙劄各有庫貯之選監工之老成勤敏者掌其鎖鑰所屬掌司四員或六七員佐理之并內堂亦屬之又經厰掌司四員或六七員在經厰居住只管一應經書印板及印成書籍佛藏道藏畨藏皆佐理之自提督之下則監官典簿十餘員第一員監官提督皇史宬并新房候轉提督俱輪流該止在廊下家宿專理皇城內一應禮儀刑名鈐束長隨當差聽事各役關防門禁其次六科廊掌司六員或八員分東西兩房管精微科內外章疏及內官履歷腳色職名月報逃亡事故數目其次又數十員或八員管二十四衙門山陵等處內官級職姓名撰寫每日傳行聖㫖稽查門禁鈐束當差聽事題奏應行禮儀應頒賞賜其次六科廊謄黃寫字一員其次管賞寫字則按節令挨次題稟禮儀文書及賞例或百餘員或數十員分兩班四撥各撥若干人其班按十二支輪之曰頭頂整一日過夜曰守早從卯至申曰守晚從申至次日天明曰末頂整一日過夜方得下班歇息四日也凡遇聖駕朝講遊幸穿麟補紅􅢁􅮌或青􅢁􅮌執藤條攔擋者皆掌司人數寫字者也或轉經厰司禮監掌司者則每撥內另有一種衙門寫字共十餘員挨補而已自提督至寫字皆穿􅢁􅮌凡出入皇城各門俱門軍接與擋道自內書堂奉㫖撥𣲖名曰正途其次或乞恩奏保改升者亞焉文書房官八員或十員職掌通政司使每日封進本章并㑹極門京官所上封本及在內各衙門本天下各藩府本府有大小濃淡之不同文書房各以名銜前後分管之其在外之閣票在內之答票一應㫖意聖諭御札俱由文書房落底簿發行凡御前面考隨堂秉筆自崇禎元年冬欽出事君能致其身題考鄭太監之惠曹太監化淳中式始至十二年夏李太監承芳署司禮監印時其名下顧三聘者亟欲升遷遂密托已之名下王建鼎代作選於衆時文一篇被巡綽發其狀李遂不得已奏知聖上立將三聘責斃降建鼎淨軍發南海子看守牆鋪其年秋季禠職逮獄內書堂讀書宣德年間創始命大學士陳山教授之後以內臣任焉凡奉㫖收入官人選年十嵗上下者二三百人撥內書堂讀書本監提督總其綱掌司分其勞學長司其細擇日拜聖人請詞林衆老師初則從長安右門人北安門出後則由北安門出入每學一名亦各具白蠟手帕龍掛香以為束修至書堂之日每給內令一册百家姓千字文孝經大學中庸論語孟子千家詩神童詩之類次第給之又每生給刷印倣影一大張其背書號書判倣然判倣止標日子號書不㸃句也凡有志官人另有私書自讀其原給官書故事而已派年長有勢力者六人或八人為學長選稍能寫字者為司房凡背書不過寫倣不堪或損汚書倣犯規有過者詞林老師批付提督責處之其餘小字輕則學長用界方打手重則于聖人前罰跪再重則扳著幾炷香扳著者向聖人前立彎腰用兩手扳著兩腳不許體屈屈則界方亂打如雨或半炷香或一炷香其人必眼脹頭眩昏暈僵仆甚而嘔吐成病者此最酷不近理之法也凡强凌弱衆暴寡長欺幼者每賄托學長借公法以報私怨諸凡讀書官人遇節令朔望亦放學一日其每日暮臨散則排班題詩不過雲淡風輕之類按春夏秋冬隨景而以腔韻題畢方擺列魚貫而行誤亂攙越者必羣打詬辱之别衙門官遇學生擺列行走必拱手端立讓過即司禮老公遇之亦然凡各衙門缺寫字者即具印信本奉討奉㫖撥給若干即挨名給散若已撥散將完無人讀書該監題知于二十四衙門官占官下及監工改讀書以補之禮儀房署在東安門外舊都府草場之東向南提督太監一員掌印或秉筆攝之掌司數員寫字管事數員本房長隨數員掌管一應選昏吉禮每月春夏秋冬四仲月選乳婦生男十口生女十口月給食料在妳子府居住凡宫中有喜鋪月子房則生男生女各一二口在文華殿外西北臨河之小房住及報生皇子則用生女妳口皇女則用生男妳口彌月剪髮百日命名及請髮留髮入囊册立册封選妃打扒角選駙馬一應禮儀皆經理之中書房掌房官一員散官十餘員係司禮監監工年老資深者挨轉專管文華殿中書所寫書籍對聯扇柄等件承㫖發寫完日奏進御前凡宫中糊飾如不放外匠便只是監工并學手藝牌子糊飾挨轉此處并御前作至貧老無依則發外經厰看守以待斃焉凡司禮監掌印秉筆隨堂故後各有牌位送外經厰供安各有影像送至西直關外大佛寺供安看厰監工守寺僧人侍香火不絶也御前作掌作官一員散官十餘員亦是監工年老資深者挨轉專管營造龍牀龍桌箱匱之類合用漆布桐油銀硃等物料奉准于甲字等庫關支已上二處亦掌印或秉筆提督之司禮監外差南京正副守備太監二員關防一顆其文曰南京守備內官關防護衛留都為三千里外親臣轄南京內府二十四衙門孝陵神宫監等官奏進神帛鰣魚苗薑等鮮各衙門印文比北京各多南京二字孝陵神宫監掌印太監一員别衙門可升不係司禮監也轄本陵僉書掌司及謫南種菜淨軍人等天壽山守備太監一員關防一顆轄十二陵掌印僉書工部厰掌司等官凡每年清明親率各掌印來京奏添土木每嵗辦進松花黃連茶核桃榛栗等果各陵皆有涼果厰在京鳯陽守備太監一員關防一顆護衛皇陵轄僉書數十員兼管高牆犯宗湖廣承天府守備太監一員關防一顆轄僉書數十員轄承德荆襄地方護衛顯陵徴收籽粒每年進茶扇葛布手巾香茶太嶽太和山即武當山也鎮守太監一員轄均州等處經管本山香火羽流辦進榔梅鷹嘴筍騫山茶等件正陽等九門永定等七門正副提督太監二員關防一顆已上六處秩在文書房監官之上并孝陵掌印各有敕諭又正陽等門掌司一員秩視六科廊然不隨內轉缺則補之近已裁革不補大壩等馬房正副提督太監二員敕諭關防秩在文書房之次外衙門官亦間任之蘇杭織造太監一員亦有敕諭關防秩視秉筆東厰成祖即位永樂十八年始置其外署在東安門外迤北提督太監一員關防一顆其敕諭最為隆重凡內官奉差關防皆曰某處內官關防惟此處篆文曰欽差總督東厰官校辦事太監關防至天啓四年因避御諱改鑄官旗本厰設有掌貼刑千百户二員掌班領班司房四十餘名圓帽皂靴穿直身十二顆管事圓帽􅢁􅮌皂靴其攩頭辦事百餘名分子丑寅卯十二顆圓帽􅹑褶白靴畨役可千餘名外署大㕔之左小㕔供嶽武穆像一軸㕔後磚影壁雕狻猊等獸狄梁公斷虎故事大㕔之西有祠堂內供從來掌厰職名牌位前有坊曰百世流芳稍南有獄一處凡重犯則繫獄輕犯干連則在署外之店也署西面有門以通出入向南大門未嘗輕開也凡中府等處㑹審大獄北鎮撫司拷訊重犯本厰皆有人聽記其口詞一本拶打數一本于本日晚或次早奏進每日訪看兵部有無進部有無塘報京城各門皇城各門關防出入俱有事件奏聞或地方失火或雷擊何物亦奏聞之又每月晦日奏報在京雜糧米豆油麵之價此祖宗以來良法深意欲九重之上覽物價之貴賤即可知農嵗之豐歉以商賈之通塞便可知道路之夷塞也凡皇城禁地人命亦皆有事件其內署在東上北門之北街東混堂司之南有匾曰朝廷腹心有至聖堂有井其掌厰公宫中直房有欽給密封牙章一枚凡事件應封奏者以此鈐封內官監掌印太監一員其所屬有總理管理僉書典簿掌司人數寫字監工自典簿以下分三班宫中過夜每班掌司第一人曰掌案所管十作曰木作石作瓦作搭材作土作東行西行油漆作婚禮作火藥作并米鹽庫營造庫皇壇庫裏氷窨金海等處凡國家營建之事董其役凡御前所用銅錫木鐵之器日取給焉外厰甚多各有提督等官真定府設有插印木植管理太監一員則內官監之外差也四年一換只有本監公文無敕書關防又寶坻縣收籽粒西湖河差大石窩白虎澗等處各有提督俱外差也凡內外修建分封藩王府第外差須數萬金營求方能到手領敕書關防前去工竣即回凡大行帝后陵寢妃嬪皇子女薨逝修造墳塋及完婚修理府第皆其職掌御用監掌印太監一員裏外監把總二員猶總理焉有典簿掌司寫字監工凡御前所用圍屏擺設器具皆取辦焉有佛作等作凡御前安設硬木庫桌匱閣各象牙花梨白檀紫檀烏木鸂鶒雙陸棋子骨牌梳櫳螺甸填漆雕漆盤匣扇柄等件皆造辦之仁智殿有掌殿監工一員掌管武英殿中書承㫖所寫書籍畫扇奏進御前亦猶中書房之于文華殿中書也司設監掌印太監一員有總理僉書等官如內官監而所職掌者鹵簿儀仗圍幕褥墊各宫冬夏簾涼席帳幔雨袱子雨頂子大傘之類事最煩苦逺不逮御用監內官如遇御前打㸃庫藏擡箱則此三衙門之人皆任重擡運不敢憚勞御馬監掌印太監一員有監督提督四衛勇士小厮有監官有典簿掌司寫字拏馬等官有象房掌房等官有母象九隻各居一房缺則奏于外象房改補金鞍作長隨房等處有各灘監工本監象房之東有裏草攔草場皇城之外有天師菴草場舊都府草場天啓六年夏舊都府草場失火魏忠賢督率內外官員軍士人等救撲三日始息神宫監掌印太監一員司禮監監官或文書房無力者升之有僉書掌司十餘員在端門之左九廟在焉四孟之朔聖駕親享之正旦節及别朔或遇日食則改卜于初五日其餘節令祀事惟謹即外太廟也其地不許畜犬萬厯年間掌印杜用養一獬􅼋小狗最為珍愛東厰李太監訪知之指為違禁不敬聲欲恭奏用費千餘方得免尚膳監掌印太監一員光祿寺西門提督太監一員西華門內裏監有總理一員管理僉書掌司數員寫字監工及外牛房羊房等厰監工共百餘員而擡供養官撥子官長隨各數十員光祿寺涼樓醬房逢七等項各有監工坐家名色職掌造辦每日早午晚奉先殿供養膳品乾清宫等宫一號殿仁壽宫等宫眷月分㕑料各有差等凡有御前掌印秉筆管事牌子暖閣近侍及外之內閣文華武英殿中書畫士卓兒銀兩咸光祿寺職掌用典簿關防緘封每月酒飯一桌折銀十兩有竒半桌者五兩有奇到每月晦照欽賞數目坐名頒給之凡遇大典禮聖駕升大座則司禮監催督光祿寺備辦茶飯鐘鼓司承應九奏之樂有所謂炮鳯烹龍者鳯乃雄雉龍則宰白馬代之耳至如南京等處進到各樣鮮品皆屬收納天啓以前凡聖駕每日三時所進之膳俱司禮監掌印秉筆掌東厰者二三人輪辦之近年改由此監亦節省意至崇禎十三年復照舊例挨月輪辦遵祖制也尚寶監掌印太監一員僉書等官可數十員職掌御用寶璽勑符將軍印信其所司者尚寶司凡所領寶璽曰皇帝奉天之寶郊天齊醮用之曰尊親之寶上尊號用之曰親親之寶有大小二顆與藩府用之曰誥命之寶敕命之寶廣運之寶則用之最多也曰御前之寶則宫中庫藏箱鎖用之曰御藥謹封則牙刻者也御藥房用之凡勑命逺出者仍用一黃紙封套上下悉用一牙刻方寶封識之其文曰册符出驗四方其餘寶咸玊刻也凡寶皆內尚寶女官掌之遇用寶則尚寶司以揭帖赴尚寶監尚寶監請㫖然後赴內司領取嵗用寶三萬餘顆嵗用寶色銀六十餘兩工部虞衡司辦進其餘寶璽尚多不恆用天啓甲子冬河南巡撫朴紹遣副使張夢鯨進到寶璽玉質瑩潔欵制渾其文曰受命于天既壽永昌似小篆不甚古角無刓缺的非秦璽想是宋元時僞造者印綬監掌印太監一員僉書掌司數十員職掌古今通籍庫并鐵劵誥敕貼黃印信圖書勘合符驗信符諸事及南京解到文武誥軸凡追奪誥命交納本監㑹同該科給事中中書舍人於勘合底簿內附寫為事緣由類于本監後小門之西傍河牆焚化直殿監掌印太監一員僉書等官數十員職掌皇極建極中極武英文華殿廷樓閣廊廡灑掃之役最勞苦冷局無大㕔公署也尚衣監掌印太監一員管理僉書掌司監工數十員掌造御用冠冕袍服履舄靴襪之事兵仗局之南舊監庫之北即本監裁縫匠役成造御服之袍房也又名曰西直房都知監掌印太監一員不甚顯貴餘者皆本監寫字長隨各有青紅執事衣服凡聖駕出朝謁廟等項在前警蹕清御者即此監之官也手執骨朵身穿鸚􅛥等補子戴平巾或官帽亦有穿圓領􅢁􅮌者其人極寒苦難以升轉下下衙門也惜薪司掌印太監一員總理數十員僉書掌道掌司寫字監工數十員各外厰又數十員專管宫中所用柴炭及二十四衙門山陵等處內官柴炭每月初四十四二十四日開𤣥武等門放夫匠打掃淨車及擡運堆積糞壤每嵗春暖開長庚蒼震等門放夫役淘浚宫中溝渠正旦節安彩粧凡遇冬寒宫中各銅缸木桶該內官監添水奏安鐵篘其中每日添炭以防氷涷凡宫中所用紅籮炭者皆易州一帶山中硬木燒成運至紅籮厰按尺寸鋸截褊小員荆筐用紅土刷筐而盛之故名曰紅籮炭也每根長尺許圍可徑二三寸不等氣暖而耐久灰白而不爆如曾經伏雨久淋性未過盡而火氣大熾多能損人倐令炫暈昏迷發嘔大人尚可皇子女嬰幼何堪又宫中咸木做地平牆壁多缺土氣凡乳母畏寒皇子女或中此毒不覺屢致薨夭不可不深為察也順天府嵗供糯米一十五石一斗永平府嵗供紅棗一萬五千五百七十斤于紅籮炭交納之厰中舊有香匠塑造香餅獸炭又塑造將軍或福判仙童鍾馗各成對偶高二尺許用金彩裝畫如門神黑面黑手以存炭制名曰彩粧于十二月二十四日奏安于宫殿各門兩傍此亦嵗暮植將軍炭于門旁之遺意也至次年二月初二日仍擡歸本厰修補裝新臨年節再安魏忠賢擅政時各增而大之所費百倍于前傀儡體做法高八九尺丈餘不等穿以真正綾絹紵紬佩以真正弓矢兵器鬚眉直竪猛惡如生又恐無知之人戲弄損壞凡該地方近侍必明燈看守雖氷雪寒夜不敢逺離必交接明白人人敢怨而不敢言凡隆德等殿修建齊醮焚化之際用楊木長柴宫中膳房用馬口柴內官關領則片柴也外有北厰南厰西厰新南厰等處各有掌厰僉書監工貯收柴炭以聽關支鐘鼓司掌印太監一員僉書數十員司房學藝官二百餘員掌管出朝鐘鼓凡聖駕朝聖母回及萬壽聖節冬至年節升殿回宫皆穿有補紅貼裏頭戴青攢頂綴五色絨在聖駕前作樂迎導宫中升座承應凡每年九月登高聖駕幸萬嵗山端午鬭龍舟插栁嵗暮宫中驅儺以及日月蝕救護打鼓皆本司職掌西內秋收之時有打稻之戲駕幸旋磨臺無逸殿等處本司扮農夫村婦及田畯官吏徴租交納詞訟等事內官監等衙門伺候各用器具亦祖宗使知稼穡艱難之意又過錦之戲約有百回每回十餘人不拘濃淡相間雅俗並陳全在結局有趣如說笑話之類又如雜劇故事之類各有引旗一對鑼鼓送上所粧扮者備極世間騙局俗態并閨閫拙婦騃男及市井商匠刁賴詞訟雜耍把戲等項皆其承應又御用監武英殿畫士所畫錦盆堆則名花雜果或貨郎擔則百物畢陳或將三月韶光富春山子陵居等詞曲選整套者分編題目畫成圍屏按節令安設又上元之前或于乾清宫丹陛上安七層牌坊燈或于壽皇殿安方員鰲山燈有高至十三層者派近侍上燈鐘鼓司作樂內府供用庫備蠟燭內官監備竒花火炮巧線盆子烟火火人火馬之類又水傀儡戲其製用輕木雕成海外四夷及蠻王仙聖將軍力士之像男女不一約高二尺餘止有臀以上無下體油漆彩畫如生每人之下平底安一栒卯用長三尺許竹板承之長丈餘濶數尺進深二尺餘深方木池一箇錫箱不漏添水七分下用凳支起又用紗圍屏隔之經手動機之人皆在圍屏之內自屏下游移動轉水內用活魚蝦蟹螺蛙鰍鱔萍藻之類浮水上聖駕升座向南則鐘鼓司官在圍屏之內將人物各以竹片托浮水上游鬬玩耍鐘鼓喧鬨另有一人執鑼在旁宣白題目替傀儡登答讚導喝采或英國公三敗黎王故事或孔明七擒七縱或三寶太監下西洋八仙過海孫行者大閙龍宫之類惟是暑天白晝作之猶耍把戲者耳天啓六年以後凡御前撒科打院本有鐘鼓司僉書王進朝綽號王瘤子者抹臉詼諧公然稱讚惜薪司怎樣軫恤商人內府庫怎樣米積天堆東厰怎樣釐奸剔弊寶和店怎樣裕國通商內修朝殿外鎮邊疆或稱好個魏公公或誇好個魏太監聖顔每為喜悅其人物器具御用監也水池魚蝦內官監也圍屏帳幔司設監也大鑼大鼓兵仗局也寶鈔司掌印太監一員管理僉書十餘員掌司監工數十員每年工部商人辦納稻草石灰木柴若干萬斤又香油四十五斤以為膏車軸之用抄造草紙竪不足二尺濶不足三尺各用簾成一張即以獨輪小車運赴平地類總入庫每嵗進宫中備宫人使用至于皇上所用草紙則係內官監紙房抄造淡黃色綿軟細厚裁方可三寸餘進交官淨近侍收非此司造也神廟至天啓惟市買杭州好革紙用之祖宗時造鈔印板及紅印聞其在庫中貯埋其衙門左臨河後倚河有泡稻草池而每年池中濾出石灰草渣三百餘年陸續堆積竟成一卧象之形名曰象山有作房七十二間各具一竈突朝天名曰七十二凶神凡空闊地土最宜種蔬今畦圃綿亘桔橰相聞若田家清野之象云混堂司掌印太監一員僉書監工數員職司沐浴堂子惜薪司月給柴薪內官監撥有夫役今事皆廢弛凡內官皆于皇城外有堂子之佛寺內沐浴有未選中的淨身男子俗稱無名白即古之私白者為之擦澡討賞該寺僧擅其利而無名白分其餘潤故內官全不來司沐浴也銀作局掌印太監一員管理僉書數員寫字監工數十員專管造金銀銀鐸針及挑杖金銀錢金銀豆葉等豆者圓珠重一錢或三五分不等豆葉則方片其重亦如豆不拘其數以備欽賞之用又造花銀每錠十兩不等止可八成許又祖宗舊制有票兒銀重十兩五兩三兩二兩一兩至一錢之方塊其色止有六七成上有分兩印子魏忠賢時久廢不造止以細絲銀鑿賞之失祖宗節省之意矣浣衣局掌印太監一員僉書等數十員惟此署不在皇城內在德勝門之西俗所稱漿家房是也凡宫人年老及有罪退廢者發此局居住內官監例有供給米鹽待其自斃以防漏泄大內之事法至善也天啓七年十一月客氏笞死於此兵仗局掌印太監一員管理僉書十餘員軍器庫提督一員掌關防掌司一員掌司寫字監工數十員職掌成造刀鎗劒戟鞭斧盔甲弓矢各樣大小神器又火藥局一處屬之宫中元山上鰲山頂之燈例㸃放神器三位則監工事也凡每年七夕宫中乞巧小針并御前鎖鑰鎚錐針剪之類及日月蝕救護鑼鼓響器宫中做法事鐘鼓鐃鈸法器皆𨽻之是以亦稱為小御用監也巾帽局掌印太監一員管理僉書掌司監工數十員職掌內官長隨內使小火者平巾官帽每年入夏據現在員數具題移文工部至冬初即于節慎庫領銀十餘萬兩給散內官內使人等靴料凡有羡餘繳進御前凡新升秉筆即送朝衣冠笏帶鞋一分凡選中駙馬中使之家正帽閽者之猪觜帽插栁跑馬勇士之員帽藩王之國其旗尉靴帽帶若干分皆本局造送之奏上於工部文領工價其署後臨河有梓潼帝君廟𫝊云神像是順流漂入至此不動遂建祠祀之籖最靈針工局掌印太監一員餘與巾帽局同職長內官長隨內使小火者冬夏衣每年遞散一次遇辰年戌年冬散鋪蓋銀一次凡宫中做法事揚幡桌圍等件皆𨽻焉凡內官曾賜蟒衣退出宫及病故者各具本交還本局收內織染局掌印太監一員總理僉書掌司寫字監工數十員掌染造御用及宫內應用縀匹絹帛之類有外厰在朝陽門外浣濯袍服之所又有藍靛厰在都城之西亦本局之外署也萬厯三十六年始建西頂娘娘廟于此其地素窪下時都中有狂人倡為進土之說凡男女不論貴賤筐擔車運或囊盛馬䭾絡繹如織以徼福焉甚而處女美婦藉此機㑹以恣遊觀咸坐二人小轎懷中抱一土袋香紙以往進之殊可笑也酒醋麵局掌印太監一員管理等官與别局相若也職掌內官宫人食用酒醋麵糖諸物浙江等處嵗供糯米小麥黃豆及穀草稻皮白麵有差以備御前宫眷及衙門內官之用與御酒房不相統轄司苑局掌印太監一員管理等官同前職掌宫中諸處蔬果及種藝之事嵗用黑豆穀草山東等處嵗供之御前所用瓜菜茶料俱此局與林衡等上林苑海子同辦之已上總謂之二十四衙門惟浣衣局在皇城之外也內府供用庫掌印太監一員總理管理僉書掌書寫字監工共百餘員專司皇城內二十四衙門山陵等處內官食米每員每月四斗有油庫蠟庫等處㕔前懸木魚一尾長可三尺許以示有餘糧之意也凡御用白蠟黃蠟沉香等香皆取辦于此庫其印非九重倚毗最有寵眷者不得掌也司禮監掌印掌東厰秉筆管事牌子等嵗賜祿米各於季冬給散之宫中各長街設有路燈以石為座銅為樓銅絲為門壁每日晚內府庫監工添油㸃燈以便巡視關防魏忠賢擅政盡行廢弛以便冥行毋敢言者司鑰庫掌印太監一員管理僉書寫字監工可數十員凡寶源局等處鑄出制錢該部進交本庫備御前取討賞賜之用庫中積有厯代古錢洪武以來大錢魏忠賢時導帝濫賜左右幾無孑遺凡乾清等門及午門東華門等門鑰匙皆本庫監工於五更三㸃時自宫中發出分啓各門其鑰即便繳回其印文曰司門籥庫印俗名曰天財庫內承運庫掌印太監一員近侍僉書太監十餘員掌司寫字監工數十員其署在東下馬門其職掌庫藏在宫內者曰內東裕庫曰寶藏庫皆謂之裏庫其㑹極門寶善門迤東一帶及南域磁器等庫者皆謂之外庫也凡金銀紗羅紵絲閃色織金錦羊絨玉帶內塊象牙瑪瑙寶石珍珠珊瑚之類總𨽻之又浙江等處每嵗夏秋麥米共折銀一百一萬有竒即國初所謂折糧銀今所謂金花銀是也候解到京于每季仲月由長安右門入經進本庫交收此印及直殿監印鐘鼓司混堂司印靈臺印皆本衙門第一員僉書挨掌不係貴近內臣掌至崇禎三年冬便改以貴近內臣掌也凡內官升玉帶即于本庫領取及褫降病故仍具本交還南京供應機房太監一員則本庫外差有敕諭關防所謂漢府織造是也其署漢庶人高煦遺址靈臺掌印太監一員近侍僉書數員看時刻近侍三十餘員學習數十員凡遇收選宫人則撥三四十名年幼者讀步天歌陰陽雜法天官星厯等書習寫算觀星氣輪流上臺以候測變畀呈稟掌印具呈司禮監掌印據實奏聞其占候書曰觀象玩占曰流星撮要等書皆抄謄授受不敢傳布于外世雖有抄本玩占多差訛不全未足信也其教法極嚴比司禮監書堂之學較勝云每年厯樣造厯係靈臺欽天監公同經管御酒房提督太監一員僉書數員專造竹葉清等各樣酒并糟瓜茄惟乾豆豉最佳外庭不易得也牲口房提督太監一員僉書數員收養異獸珍禽有虎城羊房彈子房掌房一員僉書數員專備彈弓所用泥彈大小輕重各有等第以黃布作袋盛之刻漏房官十數員不𨽻靈臺專管每日時刻晝則文華殿後每一時至即令直殿監官入宫換牌每夜攢㸃後至天明則隆宗門外報九刻水之第一聲而答應長隨接報第二聲如某時初一至初四某時正一至正四之類為接班起早之候也更鼓房凡有罪內臣謫司其事挨年久者一員豫牌帽總之平巾烏木牌者數人佐之餘者曰二牌曰定水牌子其餘則淨軍每夜五名輪流上𤣥武門樓打更每夜自一更三㸃起至五更三㸃止按數目用藤條擊鼓用檀木榔頭擊㸃㸃者銅鑄之大雲板也例則一更一人上樓不許攜燈晴夜尚可惟風雨晦冥苦不可言如有錯誤即責處之甜食房賞房內官一員協同內官數十員經手習學造辦虎眼等糖栽松減煠等樣一切甜食于內官監取討創金盒粧盛進安御前兼備進賜各宫及欽賜閣臣等項其造法器具皆內官自行經手絶不令人見之是以絲窩虎眼糖外廷最為珍味又七月十五日進獻波羅蜜亦所造也縧作即洗白厰掌作內官一員協同內官數十員經手習學織造各色兜羅絨各色五毒等縧花素勒甲板縧及內官長隨小火者牌繐縧惟兜羅絨織法傳自西域外毋敢私織者甜食房并此厰皆屬內御用監轄最寒苦可憫裏草攔草場在皇城內東北隅御馬監大門之南永樂初年建收料豆至宣德年間將中府草場之草分授始立場有倉厫也中府草場即舊都府草場在東安門外妳子府街永樂初創收御馬草傳云是勝國時都督府故名天師菴草場在皇城外東北角正統年間以張天師舊處改建故名牆外有井甘冽可用不減十王府街之井也已上共謂之三場𨽻御馬監各有掌厰太監一員貼場一十二員僉書數十員或百餘貟甲字庫職掌銀硃烏梅靛花黃丹緑礬紫草明礬光粉黑鉛水膠槐花藍靛五倍子濶白三梭布苧布棉木紅花水銀硼砂藤黃茜草薑黃蜜陀僧磠砂白芨梔子百藥煎之類皆浙江等省嵗供納之以備上用等監奉准討取乙字庫職掌奏本紙欒榜紙中夾等紙各省解到胖襖以備各項奏准取討丙字庫每嵗浙江辦納本色絲綿合羅絲串五色荒絲以備各項奏討而山東河南順天等府嵗納棉花絨則內官之冬衣軍士之布花咸取給于此丁字庫每嵗浙江等處辦納生漆桐油紅黃熟銅白麻麻麻黃蠟錫牛筋黃牛皮麂皮鐵線魚膠白員藤生熟建鐵以備御用監內官監等處奏准支給戊字庫職掌河南等處解到盔甲弓箭刀及廢鐵以備奏准支給承運庫職掌浙江四川湖廣等省黃白生絹以備奏討欽掌夷人并內官冬衣樂舞生淨衣等項用廣盈庫職掌黃紅等色平羅熟絹𤣥色等色杭紗及青紬綿布以便奏討廣惠庫職掌綵織帕梳櫳刡刷錢鈔錠之類以備取討廣積庫職掌盆淨熖硝熟硫黃聽盔甲厰等處成造火藥凡京營春秋操演咸取給于此贓罰庫職掌沒官衣物等件或作價抵俸給官已上總謂之曰十庫各有掌庫一員貼庫數員僉書數十員不等然十庫自戊之後不全用十干者已者已也止也是以不得不改用别名也漢經厰皇城內舊設有漢經厰內臣若干員每遇收選宫人則撥給數十名習念釋氏諸品經懴其持戒與否則聽人自便如遇萬壽聖節正旦中元等節于宫內啓建道場遣內大臣瞻禮揚幡挂榜如外之應付僧人一般其僧伽帽袈裟緇色衣亦與僧人同惟不剃髮耳事畢焚化圓滿後仍各易內臣服色神廟時曽選經典精熟心行老成持齊者數員宫女數十人亦能于各宫佛前作法事行香念經若尼姑然畨經厰習念西方梵唄經呪宫中英華殿所供西畨佛像皆陳設近侍司其燈燭香火其隆德殿欽安殿香火亦各有陳設近侍者凡做好事則懸設幡榜惟此畨經厰仍立監齊神于門傍本厰內官皆戴畨僧帽穿紅袍黃領黃護腰一永日或三晝夜圓滿掃砂萬厯時每遇八月中旬神廟萬壽聖節畨經厰雖在英華殿做好事然地方狹隘須于隆德殿大門之內跳步叱而執經誦念梵唄者十餘人粧韋䭾像合掌捧杵向北立者一人御馬監等衙門牽活牛黑犬圍待者十餘人而習學畨經跳步叱者數十人各戴方頂笠穿五色大袖袍身披纓絡一人在前吹大法螺一人在後執大鑼餘皆左持有柄圓鼓右執彎捶齊擊之緩急疏密各有節奏披五色方位魚貫而進視五方五色傘蓋下誦經者以進退若舞焉跳三四個時辰方畢監齊神者傀儡體製法真盔甲器械高與人等猶門神焉黑面𥪡鬚靈威可怖于本衙門宫門安之凡做好事畢即收于本殿庫中凡食驢肉者絶不敢入殿入則必有意外灾咎凡食牛犬肉者亦不敢入隆德殿欽安殿亦頗著靈驗人不敢犯也英華殿前菩提樹二株結子可作念珠詞臣張士範偈謹附載之其序曰大內西北之隅建有英華殿一處殿前菩提樹二株聞係九蓮菩薩慈聖皇祖母所植高二丈枝幹婆娑下垂至地儼若佛菩薩慈悲接引衆生也者盛夏開花作黃金色鼻觀時時有異香葉如椒子不從花得乃生于葉之背雙雙若綴明珠似借空花喻世幻起色香佛果别成非關生滅特現菩提身而為說法者秋深葉墮時飄揚永巷拾作念珠較南産者惜不甚大然色黃潤而分瓣之線色微白名曰多寶珠如得未曾有神廟以聖母上賓奉御容于樹之東北别殿值朔望令節親詣行禮每仰瞻雙樹若有杯棬之思焉因上尊號九蓮菩薩云偶禪友特以此珠作施備述其詳如此臣士範故作小偈以代頌言曰英華殿前菩薩樹淨土移來飽霜露借問當年種者誰植以九蓮菩提故托根不與凡卉同花作黃金欲迎風婆娑蔭覆人天界馥郁香飄帝釋宫香飄蔭覆超塵劫培得本枝千萬葉明珠每葉實離離佛子繩繩相續接秋深貝葉滿階鋪㑹得西來意㫖無分明舍利人恣取綴作人間念佛珠念兹在兹指其掌拳拳弗失非關想常將法雨潤心田澆灌菩提日日長果證三生不記春化作菩提萬億身萬億之身一身是九蓮菩薩寧異人是則名為慈聖母九品蓮花為上首即心即母即菩提菩提不朽毋不朽菩提即母足承歡誰道衆生見母難寄語恆河諸佛子莫把菩提作樹看翰林院侍講臣張士範恭識道經厰習演𤣥教諸品經懴建醮做好事亦于隆德殿欽安殿懸幡掛榜如外之羽流服色而雲璈清雅恍若仙音已上共謂之曰三經厰每遇收選官人各撥數十人𨽻之凡做好事一永日或三晝夜或五晝夜七晝夜各有欽賞錢錠為襱一總事畢易服叩頭謝恩凡三經厰將做好事之前預頒㫖意傳各衙門答應錢糧其所誦經卷所費紙劄司禮監也桌凳香爐等件內官監也鈴杵等件御用監也幡桌圍針工局也拜單幃幕傘司設監也香燭油米內府供用庫也炭餅柴火惜薪司也齊供飲食尚膳監也鐘磬鐃鈸兵仗局也南海子總督太監一員關防一顆提督太監四員管理僉書掌司監工數十員分東西南北四圍每面方四十里總二十四鋪各有看守牆鋪牌子淨軍若干人東安門外有菜厰一處是其在京之外署也職掌壽鹿獐兔菜蔬西瓜果子凡收選內官于禮部大堂同欽差司禮監監官選中時由部之後門到厰過一宿次晨㸃入東安門赴內官監又細選無違礙者方給烏木牌候收畢請萬壽山前撥散林衡署蕃育署嘉蔬署良牧署提督太監一員各有掌署官一員貼署僉書數員職掌進宫川芎雜菜栽培樹株雞黃鴨蛋小菜等項織染所掌關防太監一員僉書十餘員職掌內承運所用色絹其署向南德勝門內三座橋之北內有空地堪為園圃其染成之絹赴內承運庫交納此所亦有監督有所大使有供辦顔料諸項商人此所不𨽻內織染局盔甲厰即鞍轡局建署于都城之東南隅掌厰太監一員貼厰僉書數十員轄匠頭九十名小匠若干名專管營造鐵盔甲銃炮弓矢火藥之類萬厯年間火藥忽燃者再其三十三年九月丙申申時忽響一聲起烟如靈芝燒死京營藥把總等官九員軍人六十三名重傷者二十一名燬房屋若干間崇禎甲戌九月初七日天明時忽響一聲損房屋人甚多將置火藥石碾逺拋于泡子河城牆下又一石碾自空中落一民家屋上打透至炕而炕上所卧小孩不知何因在地無恙又一人擊挂于梁上頭與腳下垂止有皮無衣無肉骨比生時頗長許多有一吳羊兒者素以食物入厰貨賣此日已擔入忽覺眼黑耳畔略聞有些微響聲移時始醒開眼視之則身立泡子河橋上不知得何神佑而無恙也又有一賣肥皂者素在崇文門裏賣後改于門外賣是時偶入城索債被響震死于姜百户門首肥皂箱油粉狼籍見者無不悚懼奉㫖將掌厰直日內臣賀堯年等監督主事蔡宸恩逮獄薄懲之安民厰舊名王恭厰建署于都城之西南隅掌厰太監一員貼厰僉書十餘員轄匠頭六十名小匠若干名管營造錢糧與盔甲厰同墳陵西山墳陵景皇陵皇太子墳王墳公主墳各有掌官一員僉書十餘員不等以供修理灑掃看守香火凡有祭祀即本處掌府庫行禮京城內外寺廟大護國隆善寺等寺朝天宫等宫東嶽廟等廟各有燒香內官十餘員不等及東西捨飯寺亦各有內官十數員咸因年老有病退居于此止存本身柴火冬衣靴料以終天年此祖宗以來豢養之澤周詳備至者也安樂堂在北安門內掌房官一員掌司數十員凡在裏內官長隨內使小火者有病送此處醫治痊可之日則重謝房主銷假供職如不幸病故則各有送終內官啓銅符出北安門內官監給棺木板惜薪司給焚化柴擡至淨樂堂焚化淨樂堂在西直門關外亦有內官數人經管凡宫女內官無親屬者死後于此焚化堂有東西二塔塔下有眢井皆盛貯骨灰之所猶唐之宫人斜也天啓七年客氏笞死于此焚尸內安樂堂在金鰲玉蝀橋西櫺星門迤北羊房夾道有掌司總其事者二三十人凡宫人有病及年老或有罪先發此處待年久方再發外之浣衣局也成化年間憲廟皇貴妃萬娘娘專寵孝穆皇后紀娘娘覺有孕曾託病居此誕生孝廟為中興聖帝云內贊禮官附巡街長隨凡宫中祭祀禮儀等事係掌禮官職掌如外之鴻臚寺焉其官十餘員自答應長隨選其動轉便利聲音洪亮儀表豐秀者為之得穿紅圓領束金鑲帶此外又有巡街長隨亦自答應長隨內歷俸實挨戴平巾得穿青􅢁􅮌牙牌各輪流巡厯地方有旗尉數人跟隨凡禁地有異言異服及喧嚷犯禁者得詰而責之事大則開具連七紙手本名曰事件呈稟司禮監奏處事小則責打逐出而已答應長隨凡收入官人之始先選身軀偉壯有力者百餘人分派大轎即棕頂方轎也小轎即明轎也并傘扇等演習步驟凡遇謁廟朝講以至聖駕出外擡弓箭賞賜等箱駕回各交原處俱在𤣥武門之東西長庚門之外一帶廊下家住分各門共爨屬司禮監轄平巾牙牌貼裏看守六科廊報水巡街禮儀房等項皆從此中挨升補選凡夜間那方有光亮便從宫中門縫傳出急分差長隨遍尋是何處失火登時回奏凡召對宣官及欽賜大臣銀兩表裏羊酒瓜茄等項皆長隨齎送天下文武官員各藩府進到表箋禮物皆長隨收接捧進其為首數員有官帽曰答應牌子即司禮監奉御然不敢穿􅢁􅮌也官下官占分兩班四撥小火者烏木牌平巾遇升一級則內使烏木牌雲宫中灑掃之時有力者勉之當差聽事兩班四撥內使小火者烏木牌平巾有總牌一名二牌三牌四牌各一名每撥餘者各數十名專答應司禮監監官典簿人數凡出票拏人馬房動刑裏外聽事房看守墩鎖淨軍皆其職掌猶外廷之皂𨽻也夜則輪流呌火巡風隔門縫聽傳驅使極勤苦忙迫可憐此等內官間多騙詐嫖賭貪忍無恥亦與外廷厮役相似京城內外十六門正陽門掌門官一員管事官數十員帶管外羅城南面居中之永定門凡冬至聖駕恭詣圜丘郊天并耕籍田皆由于此崇文門掌門官一員管事官數十員帶管外羅城之東南左安門正東之廣渠門東北之東便門崇文門即俗稱海岱門也左安門即俗稱礓䃰門也廣渠門即俗稱沙窩門也宣武門掌門官一員管事官百餘員帶管外羅城西南之右安門正西之廣寧門西北之西便門宣武門即俗稱順城門也廣寧門即俗稱彰義門也此京城之南一面也東面則朝陽門即俗稱齊化門也聖駕春分躬詣朝日壇及藩王之國則由此門出再北則東直門也西面即阜城門即俗稱平則門也聖駕秋分躬詣夕月壇則由此門出再北則西直門也北面居西者德勝門也聖駕謁陵及大行帝發引則出此門北面居東者曰安定門也凡遇夏至聖駕恭詣方澤壇祭地即經由此門也各掌門官一員管事官十餘員或三四十員與前三門亦同稽查出入交納課程已上俱聽正副提督掌司節制而司禮監鈐轄之凡在京大小喪柩得于安定西直東直阜城崇文宣武門發引餘三門不許喪柩出也在京府第王府每承奉正副二員典寶等官數十員公主府每中使一員閽者數十員聖駕御前凡每日親近內臣自司禮監掌印秉筆隨堂之次而名位尊顯者曰乾清宫管事其第一員或第二員則提督兩司房者也曰打卯牌子則隨朝捧劒者也其次曰御前牌子曰暖殿則朝夕在側者也其次曰管匱子曰人數司房曰管賞司房曰御藥房曰御茶房曰管庫又其次曰管弓箭曰駕馬曰尚冠等四執事則并尚衣尚履管淨者也曰帶刀曰報時刻曰大庖㕑曰宫後苑曰班上曰吹響器曰欽安殿曰隆德殿英華殿之陳設已上皆穿紅謂之曰近侍也曰某宫近侍則答應皇后妃嬪皇子女等近侍也各數十員不等總穿紅近侍也御藥房提督太監正副二員分兩班餘曰近侍二三十員未進宫未穿紅者曰學醫官人三四十員職掌上用藥餌與太醫院相表裏凡選一次官人進內必撥年少者三四十人或五六十人選醫官教習讀藥性賦醫要集覽及素問脈訣等書歷代以來無一人敢無事入藥房者防至密也凡聖駕違和傳放御醫至日四人或六人吉服入宫不論冬夏必于殿門之內設炭火一盆中焚蒼术雜香人人從盆上入叩頭畢第一人膝行跪疹左手第二員跪診右手疹畢仍互更再疹之各將聖恙大體面奏數言出至聖躋殿計藥開方具本御藥用金罐煎進之其罐口于御藥謹封緘焉御茶房秩視御藥房分兩班有牌子四員常行近侍三四十員職司茶酒瓜果凡聖駕出朝經筵講筵御用茶及宫中三時進膳聖駕匕箸中宫匕箸係其職掌尚膳監撥長隨以供汲水擡扛厯代以來亦無一人敢擅入者箆頭房近侍十餘員專習為皇子皇女請髮留髮入囊整容之事凡誕生皇子女彌月剪胎髮百日命名後按期請髮者即如外之每次剃頭然一根不留如佛子焉皇子戴𤣥青皺紗六瓣有頂圓帽名曰瓜拉冠至十餘齡留髮約年餘又擇吉入囊總束于後冬用𤣥色紵夏用𤣥色紗作囊濶二寸許長尺餘垂于後至選婚有妃始擇吉行冠禮此皇子事也皇女戴寸許濶小頭箍至十餘齡留髮約年餘又擇吉行扒角至選婚有駙馬始擇吉上頭此皇女事也凡奏文書皆禮儀房職掌凡收生婦醫婦進宫出宫或乳婦有疾更換皆禮儀房事也猫兒房近侍三四人專飼御前有名分之猫皇心所鍾愛者亦加升管事職銜牡者曰某小厮騸者曰某老爹牝者曰某丫頭候有名封則曰某管事或直曰猫管事亦隨中官數內關賞凡皇子女嬰孺時多有被猫呌得驚風薨夭有誰敢言宫內教書選二十四衙門多讀書善楷書有德行無勢力者任之三四員五六員不拘穿􅢁􅮌不妨原衙門原職銜而隨御司房或管匱子關賞以洊升玉帶騎馬仍命秉筆一員提督之所教宫女讀百家姓千字文孝經女訓女字經女誡內則大學中庸論語等書學規最嚴能通者升女秀才升女史升女官正司六局掌印凡聖母及后妃禮儀等事則女秀才為引禮贊禮官也凡宫人有罪者發落責處墩鎖或罰提鈴等名色以苦之提鈴者每日申時正一刻并天晚宫門下鎖時及每夜起更二更三四更之交五㸃則自乾清門裏提至日精門回至月華門仍還乾清宫門裏其聲方止提者隨行正步大風大雨不敢避而鈴聲若四字一句如曰天下太平天下太平云寶和等店經管各處客商販來雜貨一年所徴之銀約數萬兩除正項進御前外餘者皆提督內臣公用不係額設內府衙門之數也店有六曰寶和曰和逺曰順寧曰福德曰福吉曰寶延而提督太監之㕔廨則在寶和店也俱坐落戎府街凡奉㫖提督者亦無敕書傳云起自嘉靖年間裕邸差官徴收神廟屬慈寧宫聖母李老娘娘宫中徴用按每年販來貂皮約一萬餘張狐皮約六萬餘張平機布約八十萬匹粗布約四十萬匹棉花約六千包定油河油約四萬五千簍燒酒約四萬簍而都城內所燒者不與也荆油約三萬五千簍芝麻約三萬石草油約二千簍南絲約五百䭾榆皮約三千䭾各香鋪分用也北絲約三萬斤串布約十萬筒江米約三萬五千石夏布約二十萬匹瓜子約一萬石醃肉約二百車紹興茶約一萬箱松蘿茶約二千䭾雜皮約三萬餘張大麯約五十萬塊中麯約三十萬塊麵麯約六十萬塊京城自造細麯六十萬塊而內臣勳戚自製之麯不與也四直河油五十簍四直大麯二十萬塊玉約五十斤猪約五十萬口羊約三十萬隻俱各有稅而馬牛騾驢不與也如滇粵之寶石金珠鉛銅砂汞犀象藥材吳楚閩越山陜之幣帛絨貨又不與也明宫史卷二
