body:
  text: 明宫史卷三明吕毖撰內臣服佩貼裏其製如外廷之披褶司禮監掌印秉筆隨堂乾清宫管事牌子各執事近侍都許穿紅貼裏綴本等補以便侍從御前凡二十四衙門山陵等處官長隨內使小火者俱得穿青貼裏又有雙袖襴蟒衣凡左右袖上裏外有蟒二條自正旦燈景以至冬至陽生萬壽聖節各有應景蟒紵自清明鞦韆與九月重陽菊花俱有應景蟒羅自端陽五毒至八月月仙玉兔俱有蟒紗又舊制自十月初四日至次年三月初三日穿紵紗自三月初四日至四月初三日穿羅自四月初四日至九月初三日穿紗自九月初四日至十月初三日穿羅該司禮監預先題奏傳行凡婚慶吉典則雖遇夏秋亦必穿紵紗供事若羊絨衣服則每嵗小雪之後立春之前隨紵絲穿之凡大忌辰穿青素值廟者穿青緑花樣遇修省亦穿青素􅢁􅮌其製後襟不斷而兩傍有襬前襟兩截而下有馬面褶兩傍有耳自司禮監寫字以至提督正并各衙門總理管事方敢服之紅者綴本等補青者否圓領襯襬與外廷同各按品級凡司禮監掌印秉筆及乾清宫管事與有勞者其補皆得坐蟒次則斗牛及都知監有牙牌者鸚哥雜禽補官帽以竹絲作胎真青皺紗䝉之自奉御至太監皆戴之俗所謂剛義帽也平巾以竹絲作胎真青羅䝉之長隨內使小火者戴之制如官帽而無後山然有羅一幅垂于後長尺餘俗所謂砂鍋片是也牙牌內官監題本于內承運庫領討象牙製造每升奉御或長隨即給與一面將原帶烏木牌換收按御用監等衙門各有號數一邊刻忠字若干號一邊刻某監某銜亦間有私買者私造者從來不禁其製有雲尖下方微闊而上圓可重六七兩不等烏木牌其製荷葉頭圓徑二寸許一面刻內使或小火者字樣一面用長方火印于中其篆文四字曰關防出入而火印兩傍分刻小字或內字若干號此係官物無敢私造者凡遇失落必題知懲處另給牌繐其製用象牙或牛骨作管青緑綿結寶蓋三層圓可徑二寸下垂紅線長八寸許內懸牙牌或烏木牌上有牌繫青縧凡穿圓領隨侍及有公差私假出外本等帶之左即懸此牌繐如平居在宫穿􅢁􅮌者貼裏者俱不帶牌繐有縧帶凡內使小火者烏木牌平巾者無穿圓領束帶之理惟請轎長隨并都知監長隨各獅子等補束角帶其升有牙牌官帽便謂之奉御正六品得服麟補束金廂玳瑁或犀帶自奉御而上左右監丞五品左右少監從四品太監正四品自太監而上方敢穿斗牛補如再升則膝襴之飛魚也斗牛也蟒衣也再升則受賞也特升方賜玉帶冬則光素夏則玲瓏三月九月則頂粧玉帶也再升內府騎馬再升每嵗祿米十二石如再升但凡一級止嵗加祿米十二石耳騎馬凡內府有名騎馬者自東西下馬門起至北安西安門柵欄東上北門止又東上南門起至南內西上南門止至寶鈔司凡遇萬壽聖節正旦節凡內府騎馬者各進馬一匹若遇大㛰禮誕生慶典亦然凡進馬有例司禮監管賞寫字預先于思善等門曉示一帖曰某日進馬各家將馬之毛色并已之官銜姓名開送司禮監總辦黃本處各酬銀二錢或錢不等以為買筆墨之用此舊規也臨期請㫖如聖駕親覽所進之馬便都于乾清宫門外伺候覽過交御馬監不堪者不收換補之凡賞過祿米者遇萬壽聖節隨進馬之外仍各進鹿一隻交南海子未賞祿米者則免之又冬至之前掌印秉筆隨堂管事牌子各進子母羊四角六角羊交牲口房凡藩府所進之羊亦交牲口房所進之馬亦交御馬監也凳杌凡司禮監掌印秉筆之年髙最有寵眷者方能得此其製如靠背椅而加兩桿子傍用皮􅀈如轎前後各用一橫槓然擡者不在轅內只在桿外斜插扛擡而正行之所以曰杌者禁地不敢乘轎之義也板其製如牀面髙五寸許于偏後些安一椅圈前後以粗絨繩拴用扛二條斜插擡走離地尺餘凡司禮監掌印秉筆年老者方私置坐之不係欽賞亦不係正經品級自乾清門外至西華門東華門裏止朝服朝冠帶履與外廷同冠七梁或五梁只許司禮監掌印于祭中霤之神之夜服此祭之笏以象牙為之與外廷同抹布非布也是素紵絲或綾染柘黃長五尺闊三寸雙層方角如大帶子之式而無繐凡乾清宫管事牌子暖殿御藥房管匱子御司房管庫管弓箭請小轎四執事牌子欽安隆德英華三殿陳設近侍須䝉賜過者方敢佩于貼裏之右而蟠結縧上雙垂之露半條于外垂與衣齊刀兒小牙筯一雙小尖刀一把長六七寸不等銀鑲鯊魚皮等鞘以紅絨辮繫表于衣左牌繐之上以昭近臣殊寵非外衙門之所敢望也惟司禮監是禮儀衙門斯不屑抹布刀兒矣鐸針金銀珠翠珊瑚皆可製年節則大吉葫蘆萬年吉慶元宵則燈籠端午則天師中秋則月兔頒厯則寶厯萬年其製則八寶荔枝四字鮎魚也冬至則陽生綿羊太子梅花重陽則菊花萬壽聖節則萬萬壽洪福齊天之類洪福者于齊天字之兩傍各有紅色蝙蝠一枚以取意耳凡遇誕生㛰禮及尊上徽號冊封大典皆萬萬喜所謂鐸針者單一枝有􅀈居官帽中央者是也枝箇其製隨景如鐸針但咸小偏向成對耳挑板亦隨景如前而珍珠珊瑚自􅀈端下垂或間以寶石金方勝字耳下垂腳世廟時亦間將三種賜輔臣大臣神廟初年亦間賜宰相張居正云披肩貂鼠製一圓圈髙六七寸不等大如帽兩傍各製貂皮二長方毛向裏至耳即用鈎帶斜掛于官帽之後山子上直身製與道袍相同惟有襬在外綴本等補聖上有大紅直身袍凡遇大事若過司房或秉筆私自下直房始穿此凡見尊長則不穿其色止有天青黑緑𤣥青不敢做大紅者或亦開襬加襯衣而束本等帶者道袍如外廷道袍之製惟加子領耳間有綴補氅衣有如道袍袖者舊製本不縫袖故名曰氅綵素不拘大褶前後或三十六或三十八褶不等間亦綴本等補順褶如貼裏之製向褶之上不穿細紋俗為馬牙褶即外廷之􅹑褶也間亦綴本等補束髮冠其製如戲子所戴者用金纍絲造上嵌晴碌珠石每一座有直數百金或千餘金二千金者四瓜蟒龍在上蟠繞下加額子一件亦如戲子所戴左右插長雉羽焉唐朝帽此古製如畫上綿羊太子所戴者也以貂鼠銀鼠皮製之凡冬月隨駕出獵戴之而不寒煙墩帽亦古製也冬則天鵝絨或紵皺紗夏則馬尾所結成者上綴金蟒珠石其式如大帽直簷而頂稍細二色衣近御之人所穿之衣自外第一層謂之蓋面如􅢁􅮌貼裏圓領之類第二層謂之襯道袍第三層謂之綴領道袍其白領以漿布為之如玉環在頂而缺其前稍油垢即換之非入過皇城者不敢綴也自此三層之內或褂或襖俱不許露白色袖口凡脖領亦不許外露亦不得綴鈕口只宫人脖領則綴鈕扣是以切避忌之凡外廷講幄召對之臣不可不曉二色衣之妙處者如夏則以葛布為上身以深藍或玉色紗作下褶并按兩袖各數寸又緣子領寸許一則恐于君前露白色一則省費省福以便拆浣一把蓮宫壼中凡掌印秉筆管事牌子俱在乾清宫內各直房居住每夜除名該正管事牌子在殿內直宿其餘者候聖駕已安寢磕過安置頭寢殿門已闔則始散歸各直房或酒或茶自己用過便各安歇絶無敢私相㑹飲者以杜朋比欺䝉之弊其各家經管衣帽宫人即將宫帽一頂貼裏道袍大襖或掛共上一條領者一副總緻兩道冠之將褆繫縧牌總亦掛得停當名曰一把蓮并硬抹口絨襪靴護膝一雙俱緊安于所歇床傍伺候暗燈及燭于卓上立銅篐頭攢竹五尺一根于卓司房宫人伺候筆袋一件空紙數幅本色紙花一袋紙花者即白紙裁成方葉如碗口大以備寫字唾痰擦手之用凡猝然夜間御前有事忽有傳召或值火災意外之警便立可衣冠手持五尺速赴聖駕之前以防衛之長者巾製如東坡巾而後垂兩方帶如程子巾式神廟恆尚長者巾冠前縫綴一大西洋珠兩傍金五瓜龍戲之而後垂兩葉之中亦各蟠蒼龍凡內臣髙年之人亦有戴者或金線黑線緑廂然只不敢綴雲龍也忠靖巾六合巾方巾九華巾晉唐等製皆如外廷熹廟恆尚九華巾圓帽凡內臣皇城之內除宫帽平巾之外即帶圓帽冬則以羅或紵為之夏則馬尾牛尾人髮為之有極細者一頂可值五六兩或七八兩十餘兩者名曰瓜拉或瓜􅀈絶不稱帽子想有所避忌也棕靸巾帽局製造每年冬雪第一次即送司禮監掌印掌東厰秉筆每二雙管事牌子每一雙冰雪穿之以便趨走不滑跌也撒扇其製用木柄長尺餘合竹作小骨二十餘根用藍絹糊表兩面皆撒大塊金箔放則遮日收則入囊自司禮監掌印至管事牌子皆于宫中夏間用之只可取陰不可取風其式如外之竹涼扇而不曲長可二三尺上闊下窄宣廟有詠撒扇六言詩一首湘浦煙霞交翠剡溪花雨生香掃却人間炎暑招回天上清涼靴皂皮為之似外廷之製而底軟襯薄其裏則布也與聖上履式同而前縫少菱角各縫少金線耳頻加粉飾敝則易之凡當差內使小火者不敢概穿但單臉青布鞋青布襪而已或雨雪之日油靴則不禁也扁辮用不堪之絨紫色青緑色織如大帶子微鬆軟耳長可丈餘不等闊可三四寸凡遇雨雪將衣搊束離地八九寸以防泥汚晴天不用如冬雪之月亦得穿皮氅衣夏暑之夜亦得用摺疊竹架各支紗絹帳以禦蚊蚋也雨衣雨帽玉色深藍官緑杭紬或好油絹為之亦有蠶繭紙為者有斗體式有道袍式加掛者御前大內臣值穿紅之日有紅雨衣彩畫蟒衣方補為貼裏式者雨帽則如方巾周圍加簷三寸許耳亦有竹胎絹糊黑油漆如髙麗帽式者惟御前大內臣戴之明宫史卷三
