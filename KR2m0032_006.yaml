body:
  text: 明宫史卷四明吕毖撰飲食好尚正月初一日正旦節自年前臘月二十四日祭竈之後宫眷内臣即穿葫蘆景補子及蟒衣各家皆蒸點心儲肉將為一二十日之費三十日嵗暮即互相拜祝名曰辭舊歲大飲大嚼鼓樂喧闐為慶賀焉傍植桃符板將軍炭貼門神室内懸掛福神鬼判鍾馗等畫床上懸掛金銀八寶西番經輪或編結黄錢如龍簷楹插芝蔴稭院中焚柏枝柴名曰㷒嵗正月初一日五更起焚香放紙炮將門􅀢或木槓于院地上抛擲三度名曰跌千金飲椒柏酒喫水㸃心即扁食也或暗包銀錢一二于内得之者以卜一嵗之吉是日亦互相拜祝名曰賀新年所食之物如曰百事大吉盒兒者柿餅荔枝圓眼栗子􅌻棗共装盛之又驢頭肉亦以小盒盛之名曰嚼鬼以俗稱驢為鬼也立春之前一日順天府于東直門外迎春凡勲戚内臣達官武士赴春場跑馬以較優劣至次日立春之時無貴賤皆嚼蘿蔔名曰咬春互相請讌喫春餅和菜以綿塞耳取其聰也自嵗暮正旦咸頭戴閙娥乃烏金紙裁成畫顔色装成者亦有用真草蟲蝴蝶者咸簪于首以應節景仍有真正小葫蘆如􅀈豆大者名曰草裏金二枚可值二三十兩不等皆貴尚焉初七人日喫春餅和菜自初九日後即有耍燈市買燈喫元宵其製法用糯米細麵内用核桃仁白糖為果饀灑水滚成如核桃大即江南所稱湯圓者十五日曰上元亦曰元宵内臣宫眷皆穿燈景補子蟒衣燈市至十六日更盛天下繁華咸萃于此勲戚内眷登樓玩看了不畏人斯時所尚珍味則冬笋銀魚鴿蛋麻􅀈活鬼塞外之黄鼠半翅鶡鷄江南之蛋柑鳳尾橘漳州橘橄欖小金橘風菱脆藕西山之蘋果軟子石榴之屬冰下活蝦之類不可勝計本地則燒鵞鷄鴨燒猪肉冷片羊尾爆炒羊肚子灌腸大小套腸帶油腰子羊雙腸猪腎肉黄顙官耳脆圓子燒笋鷄䤖醃鵞鷄煠魚栁蒸煎􅻣魚酒煑䳺鶉鸛醢湯米爛湯八寶攢湯羊肉猪肉包棗泥􅀈糊油蒸餅乳餅奶皮素蔬則滇南之鸛㙡五臺之天花羊䐗菜鷄腿銀盤等麻菇東海之石花海白菜龍鬚海帶鹿角紫菜江南之烏笋糟笋香蕈遼東之松子薊北之黄花金針都中之山藥土豆南都之薹菜糟笋武當之鷹嘴笋黄精黑精北山之榛栗梨棗核桃黄連茶木蘭芽蕨菜蔓菁不可勝數茶則六安松蘿天池紹興岕茶徑山茶虎邱茶也凡遇雪則煖室賞梅喫炙羊肉包渾酒牛乳十九日名燕九是日也都城之西南有白雲觀者云是勝國時邱真人成道處此日僧道輻輳凡聖溷雜勲戚内臣凡好黄白之術者咸游此訪丹訣焉自十七日或至十九日御前安設各様燈盡撤之也二十五日曰填倉亦醉酒飽肉之期二月初二日各宫門撤出所安彩粧各家用黍麵棗糕以油煎之或以麵和稀攤為餅名曰薫虫是月也分菊花牡丹凡花木之窖蔵者開隙放風清明之前收蔵貂鼠帽套領狐狸等皮衣食河豚飲蘆芽湯以解熱各家煮過夏之酒此時喫鮓名曰桃花鮓三月初四日宫眷内臣換穿羅衣清明則鞦韆節也戴栁枝于鬢坤寧宫後及各宫皆安鞦韆一架凡各宫之溝渠俱于此時疏濬之竹篾棑棚大木補天溝水管俱于此時油捻之并銅缸俱刷換以新汲水也凡内臣院宇大者即製蓆箔為涼棚以繩收放取陰也聖駕幸囘龍觀等處賞海棠窖中花樹盡出園圃亭榭棚欄等項咸此月修飾富貴人家咸賞牡丹花修涼棚二十八日東嶽廟進香喫燒笋鵞喫涼糕糯米麵蒸􅌻加糖碎芝麻即糍巴也喫雄鴨腰子大者一對可值五六分傳云食之補虚損也四月初四日宫眷内臣換穿紗衣欽賜京官扇柄牡丹盛後即設席賞芍藥花也初八日進不落夾用葦葉方包糯米長可三四寸闊一寸味與粽同也是月也嘗櫻桃以為此嵗諸果新味之始喫笋鷄喫白煑猪肉以為冬不白煑夏不熝也又以各様諸肥肉薑蔥蒜剉如豆大拌飯以萵苣大葉裹食之名曰包兒飯造甜醤豆豉初旬以至下旬耍西山香山碧雲等寺耍西直門外之髙梁橋涿州娘娘馬駒橋西頂娘娘進香二十八藥王廟進香喫白酒氷水酪取新麥穂煑􅌻剥去芒殻磨成新條食之名曰捻轉去聲呼之以嘗此嵗五穀新味之始也司禮監有一種扇以墨竹為骨色箋紙而兩面楷寫論語六字一句成語極多脆裂倣此甚費工價也五月初一日起至三十日宫眷内臣穿五毒艾虎補子蟒衣門兩傍安菖蒲艾盆門上懸掛弔屏上畫天師或仙子仙女執劍降五毒故事如年節之門神焉初五日午時飲硃砂雄黄菖蒲酒喫粽子喫加蒜過水麵賞榴花佩帶艾葉合諸樂畫治病符聖駕幸西苑看龍舟划船或幸萬歲山前插栁看御馬監勇士跑馬走解夏至伏日戴草麻子葉長命菜即馬齒莧也六月初六日皇史宬古今通集庫晒晾喫過水麵外象赴宣武門外洗初伏中伏末伏日亦喫過水麵喫銀苖菜即藕之新嫩秧也初伏日造麯惟以白麵用菉豆黄加料和成躧之立秋之日戴楸葉喫蓮蓬藕曬伏薑賞茉莉梔子蘭芙蓉等花七月初七日宫眷穿鵲橋補子宫中設七巧子兵仗局伺候乞巧針十五日中元甜食房進供佛波羅蜜西苑做法事放河燈京都寺院咸做盂蘭盆追薦道場亦放河燈于臨河去處也是月也喫鰣魚為盛㑹賞荷花鬭促織而促織之善鬭者一枚可值十餘兩不等各有名色以賭博求勝也八月宫中賞秋海棠玉簪花自初一日起即有賣月餅者加以西𤓰藕互相餽送西苑躧藕至十五日家家供月餅𤓰菓候月上焚香後即大肆飲㗖多竟夜始散席者如有剰月餅仍整收于乾燥風涼之處至嵗暮合家分用之曰團圓餅也始造新酒蟹始肥凡宫眷内臣喫蟹活洗淨蒸熟五六成羣攅坐共食嬉嬉笑笑自掲臍盖細細用指甲挑剔蘸醋蒜以佐酒或剔蟹胷骨八路完整如蝴蝶式者以示巧焉食畢飲蘇葉湯用蘇葉等件洗手為盛㑹也凡内臣多好花木于院宇之中擺設多般並養金魚于缸羅列小盆細草以示侈富有紅白軟子大石榴是時各剪離枝甘甜大瑪瑙葡萄亦于此月剪下缸内著少許水將葡萄枝懸封之可留至正月色尚鮮九月御前進安菊花自初一日起喫花糕宫眷内臣自初四日換穿羅重陽景菊花補子蟒衣初九日重陽節駕幸萬嵗山登髙或兔兒山旋磨臺登髙喫迎霜麻辣兔菊花酒是也糟𤓰茄糊房窻製諸菜蔬抖晒皮衣製衣禦寒十月初一日頒厯初四日宫眷内臣換穿紵絲喫羊肉爆炒羊肚麻辣兔虎眼等各様細糖凡平時所擺玩石榴等花樹俱連盆入窖喫牛乳乳餅奶皮蒸窩酥糕蚫螺直至春二月方止也是月也始調鷹畋獵鬭雞内臣貪婪成俗是以性好賭博既賴雞求勝則必費重價購好健鬭之雞僱善養雞者晝則調馴夜則加食名曰貼雞須燃燈親看以計所啄之數有三四百口者更妙也是時夜已漸長内臣始燒地炕飽食逸居無所事事多寢寐不甘又須三五成羣飲酒擲骰看紙牌耍骨牌下碁打雙陸至二三更始散方睡得著又有獨自喫酒肉不下者亦如前約聚輪流辦東幫凑飲啖所談笑者㮣鄙俚不堪之事多有醉後爭忿小則罵打童奴以遷怒大則變臉揮拳将祖宗父母互相換罵為求勝之資然易得和解磕過幾個頭流上㡬眼淚即照舊歡暢如初也凡攅聚飲食之際其固獲揚飯放飯流歠共食求飽咤食嚙骨或膝上以哺弄兒或棄肉與猫犬真可笑也如有喫素之人修善念佛亦必羅列果品飲茶久坐或至求精爭勝多不以簞食瓢飲為美亦可笑也間亦有一二好看書習字者樂聖賢之道或杜門篝燈草衣糲食不茍取不濫予差足愉快奈寥寥不多見耳内臣又最好喫牛驢不典之物曰挽口者則牝具也曰挽手者則牡具也又羊白腰者則外腎卵也至于白牡馬之卵尤為珍奇貴重不易得之味曰龍卵焉十一月是月也百官傳戴煖耳冬至節宫眷内臣皆穿陽生補子蟒衣室中多掛綿羊太子畫貼司馬監刷印九九消寒詩圖每九詩四句自一九初寒纔是冬起至日月星辰不住忙止皆鼓詞俚語之類非詞臣應制所作又非御製不知如何相傳年久遵而不敢改此月糟醃猪蹄尾鵞肫掌喫炙羊肉羊肉包匾食餛飩以為陽生之義冬笋到即不惜重價買之每日清晨喫爉湯喫生炒肉渾以禦寒十二月初一日起便家家買猪醃肉喫灌腸喫油渣滷煑猪頭燴羊頭瀑炒羊肚煠鐵脚小雀加鷄子清蒸牛乳白酒糟粗糟蟹煠銀魚等醋溜鮮鯽魚鯉魚欽賞臘八雜果粥米是月也進煖洞薫開牡丹等花初八日喫臘八粥先期數日將紅棗槌破泡湯至初八早加粳米白米核桃仁菱米炙粥供佛聖前户牖園樹井竈之上各分布之本家皆喫或亦互相饋送誇精美也二十四日祭竈蒸㸃心辦年競買時興錦段製新衣以示奢美富豪三十日嵗暮守嵗乾清宫丹墀内自二十四日起次年正月十七日止每旦晝間放炮遇風大暫止半日一日安鼇山燈紥煙火凡聖駕陞座伺候花炮聖駕回宫亦放大花前導皆内宫監職掌其前𨗳擺對之滚燈則御用監燈作所備者也凡宫眷所用飲食皆本人所闗賞賜置買僱倩貧窮宫人在内炊爨烹餁其手段髙者每月工食可得數兩而零星賞賜不與焉凡煑飯之米必揀簸整潔而香油甜醬豆豉醤油醋一應雜料俱不惜重價自外置辦入也凡宫眷内臣所用皆炙􅏼煎炒厚味遇有疾服藥多自己任意糊塗調治不肯忌口總之宫眷所重者善烹調之内官而各衙門内官所最喜者又手段髙之㕑役也明宫史卷四
