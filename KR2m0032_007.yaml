body:
  text: 明宫史卷五明吕毖撰內板書數五倫書計六十二本一千七百一頁周易大全計十二本一千一百十八頁書傳大全計十本七百六十一頁詩傳大全計十二本九百九頁春秋大全計十八本一千四百五十九頁禮記大全計十八本一千二百五十九頁書傳計六本五百八十三頁易傳計六本五百八十二頁詩傳計六本六百三十五頁春秋傳計四本四百四十頁禮記計八本一千六十二頁四書大全計二十本一千五百九十九頁四書集注計十本八百二十頁性理大全計三十本二千二百六十九頁資治通鑑綱目計四十本四千一百頁續資治通鑑綱目計十四本一千一百二十二頁少微通鑑節要計二十本一千四百三十八頁資治通鑑節要續編計二十本一千六百八十三頁晏宏資治通鑑綱目計三十本四千零二十頁文獻通考計一百本一萬八百三十六頁歷代名臣奏議計一百五十本九千九百二十頁歷代通鑑纂要計六十本三千六百三十二頁大明會典計一百四十本六千五百九十頁事文類聚計一百三十本八千三百六十頁大明一統志計四十本三千四百五十頁明倫大典計二十四本七百二十頁大明集禮計三十六本二千四百七十六頁大學衍義計二十本一千三百八十八頁大學衍義補計四十本三千六百頁對類計十二本八百七十三頁諸司職掌計三本四百二十八頁大明官制計三本三百十頁御製大誥計四本二百五十三頁大明律計二本二百七頁御製文集計八本七百十三頁洪武正韻計五本五百頁御製詩集計一本八十四頁韻府羣玉計十本一千四百頁經史海篇直音計五本五百十二頁廣韻計二本二百五十五頁玉篇計二本三百十五頁經書音釋計二本一百七頁詩韻釋義計二本一百五十八頁四書白文計六本三百十二頁詩學大成計十四本一千頁爾雅埤雅計四本三百九十七頁許氏説文計八本六百五十頁孔子家語計三本一百四十四頁通書大全計八本九百九十頁列女傳計三本一百二十五頁神課金口訣計二本二百四十頁仁孝皇后勸善書計十本八百七十六頁臞仙肘後神樞計二本一百六十八頁雍熙樂府計二十本一千七百五十三頁選擇厯書計二本二百五十六頁三國志通俗演義計二十四本二千一百五十頁厯代臣鑒計十本五百六十頁貞觀政要計六本三百七十頁居家必用計十本八百八十頁聖學心法計十本三百十五頁釋文三注計千字文七十一頁胡曽詩九十九頁蒙求一百四十五頁飲膳正要計三本一百七十五頁唐賢三體詩計二本一百七十二頁古文精粹計二本二百五十六頁李白詩計四本三百六頁吕真人文集計二本一百四十頁髙皇后傳計一本四十七頁女訓計一本四十九頁內訓計一本五十一頁尚書孝經大學中庸計五本三百三十六頁選詩補注計三本三百十二頁唐詩鼓吹計五本二百六十六頁周易占法計二本二百四十頁草堂詩餘計二本一百九十頁恩紀含春堂詩計二本二百四十頁小四書計三本二百四十頁明心寶鑑計二本二百十五頁擊壤集計四本三百五十頁勸忍百針計四本三百頁古文真寶計四本三百九十一頁醫要集覽計六本二百八十頁草韻辨體計六本二百七十頁增定華裔譯語計十一本一千七百八頁評史心見計六本三百五十頁通鑑博論計三本二百九十頁重刻證類本草計十本一千二百四十五頁皇明祖訓計一本五十頁養生類纂計五本一百九十七頁祖訓條章計一本十二頁釋氏源流應化事迹計四本四百四十頁皇明典禮計一本九十五頁洪武禮制計一本八十二頁御製洪範篇序計一本三十頁稽古定制計一本八十一頁慈聖宣文皇太后女鑒計一本六十九頁鄭氏女孝經計一本四十二頁曹大家女訓計一本十六頁女誡直解計一本四十八頁劉向説苑計五本三百二十五頁內則詩計一本六十二頁勤政要典計一本七十三頁昭鑑録計一本一百五十三頁內令計一本十二頁外戚事鑒計一本六十八頁山居四要計一本八十三頁臞仙肘後經計一本一百十二頁玉匣記計一本八十二頁省躬録計一本七十二頁祥異賦計一本四十九頁步天歌計一本八頁傳心妙誤計一本四十五頁詳明算法計一本一百十頁草字碎金計一本九十二頁真字碎金計一本九十二頁千家姓計一本二百九十二頁為善陰隲計四本三百七十二頁小學書解計一本一百六頁忠經計一本四十二頁孝經大義計一本四十三頁歷代紀年計一本三十六頁四時歌曲計一本十一頁隨機應化録計一本六十頁髙皇道德經注解計一本六十九頁達靼字孝經計一本四十二頁醫按書計一本三十二頁蒙求白文計一本三十九頁山歌計一本四頁華裔譯語計一本八十八頁古字便覽計一本五十二頁八行遺字集計一本二十八頁警世篇計一本三十一頁忠經直解計一本十六頁太上感應靈篇計一本九十二頁憲綱計一本五十頁百家姓計一本十頁大學計一本三十六頁千字文計一本十七頁孝經計一本十六頁中庸計一本五十六頁千家詩計一本四十四頁四言雜字計一本十二頁神童詩計一本二十頁七言雜字計一本十三頁三字經計一本二十六頁啓蒙集計一本四十頁啓蒙書法即永字八法計一本二十一頁草訣百韻計一本十四頁草訣百韻歌計一本四十頁八行圖説計一本四十一頁孝經直解計一本三十六頁周公解夢書大全計二本七十頁四書直解計二十六本一千八百四十頁書經直解計十三本八百五十六頁通鑑直解計二十五本一千四十二頁帝鑑圖説計六本三百五十六頁劉向新序計三本一百四十二頁洪武正韻玊鍵計二本一百三十頁佛經一藏計六百七十八函十八萬八十二頁共用白連四紙四萬五千二十三張藍絹五十三匹七尺四寸黃絹二十六匹二丈四尺一寸已上每匹長三丈二尺黃毛邊紙五百七十張黃連四紙三百四十七張藍毛邊紙四千九百十二張白户繇紙一萬八百九十五張黑墨二百八十六斤八兩白麵一千一百二十五斤明礬四十五斤道經一藏計五百十二函十二萬一千五百八十九頁共用白連四紙三萬八百九十七張藍絹一百八十二匹一丈八尺六寸藍毛邊紙三千十八張黃絹二十匹一丈六尺黃連四紙一百七十六張黃毛邊紙五百二張白户繇紙八千一百七張黑墨一百六十斤八兩白麵七百五十斤明礬二十五斤畨經一藏計一百四十七函十五萬七十四頁共用腰子白鹿紙一萬三千六百四十三張大五大部經華嚴經八十一本大涅槃經四十二本報恩經七本金光明經十本心地觀經八本小五大部經法華經七本楞嚴經十本佛母大孔雀經三本地藏經三本梁皇懴十本圓覺經彌陀經諸品經咒金剛經注解一本一百四十七頁華嚴小鈔一百十七本三千二百十八頁諸真寶懴十二本小道經一部明宫史卷五
