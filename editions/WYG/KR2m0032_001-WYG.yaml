body:
  text: 乾隆四十七年四月十七日内閣奉上諭昨於養心殿存貯各書内檢有明朝宫史一書其中分類叙述宫殿樓臺及四時服食宴樂并内監職掌宫闈瑣屑之事卷首稱蘆城赤隠吕毖較次其文義猥鄙本無足觀葢明季寺人所為原不堪採登冊府特是有明一代粃政多端總因閹寺擅權交通執政如王振劉瑾魏忠賢之流俱以司禮監秉筆生殺予奪任所欲為遂致阿柄下移乾綱不振每閲明代宦官流毒事蹟殊堪痛恨即如此書中所稱司禮監掌印秉筆等竟有秩尊視元輔權重視總憲之語以朝廷大政付之刑餘俾若軰得以妄竊國柄奔走天下卒之流冦四起社稷為墟伊誰之咎乎著將此書交該總裁等照依原本抄入四庫全書以見前明之敗亡實由於宫監之肆横則其書不足録而考鏡得失未始不可藉此以為千百世殷鑒並將此㫖録冠簡端欽此
